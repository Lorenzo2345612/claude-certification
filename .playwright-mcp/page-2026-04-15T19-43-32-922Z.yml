              - code [ref=e2808]: "-p"
              - text: flag, auto mode aborts if the classifier repeatedly blocks actions, since there is no user to fall back to. See
              - link "when auto mode falls back" [ref=e2809] [cursor=pointer]:
                - /url: /docs/en/permission-modes#when-auto-mode-falls-back
              - text: for thresholds.
            - separator [ref=e2810]
            - heading "Navigate to header Avoid common failure patterns" [level=2] [ref=e2811]:
              - link "Navigate to header" [ref=e2812] [cursor=pointer]:
                - /url: "#avoid-common-failure-patterns"
                - img [ref=e2814]
              - generic [ref=e2816] [cursor=pointer]: Avoid common failure patterns
            - generic [ref=e2817]: "These are common mistakes. Recognizing them early saves time:"
            - list [ref=e2818]:
              - listitem [ref=e2819]:
                - strong [ref=e2820]: The kitchen sink session.
                - text: You start with one task, then ask Claude something unrelated, then go back to the first task. Context is full of irrelevant information.
                - blockquote [ref=e2821]:
                  - generic [ref=e2822]:
                    - strong [ref=e2823]: Fix
                    - text: ":"
                    - code [ref=e2824]: /clear
                    - text: between unrelated tasks.
              - listitem [ref=e2825]:
                - strong [ref=e2826]: Correcting over and over.
                - text: Claude does something wrong, you correct it, it’s still wrong, you correct again. Context is polluted with failed approaches.
                - blockquote [ref=e2827]:
                  - generic [ref=e2828]:
                    - strong [ref=e2829]: Fix
                    - text: ": After two failed corrections,"
                    - code [ref=e2830]: /clear
                    - text: and write a better initial prompt incorporating what you learned.
              - listitem [ref=e2831]:
                - strong [ref=e2832]: The over-specified CLAUDE.md.
                - text: If your CLAUDE.md is too long, Claude ignores half of it because important rules get lost in the noise.
                - blockquote [ref=e2833]:
                  - generic [ref=e2834]:
                    - strong [ref=e2835]: Fix
                    - text: ": Ruthlessly prune. If Claude already does something correctly without the instruction, delete it or convert it to a hook."
              - listitem [ref=e2836]:
                - strong [ref=e2837]: The trust-then-verify gap.
                - text: Claude produces a plausible-looking implementation that doesn’t handle edge cases.
                - blockquote [ref=e2838]:
                  - generic [ref=e2839]:
                    - strong [ref=e2840]: Fix
                    - text: ": Always provide verification (tests, scripts, screenshots). If you can’t verify it, don’t ship it."
              - listitem [ref=e2841]:
                - strong [ref=e2842]: The infinite exploration.
                - text: You ask Claude to “investigate” something without scoping it. Claude reads hundreds of files, filling the context.
                - blockquote [ref=e2843]:
                  - generic [ref=e2844]:
                    - strong [ref=e2845]: Fix
                    - text: ": Scope investigations narrowly or use subagents so the exploration doesn’t consume your main context."
            - separator [ref=e2846]
            - heading "Navigate to header Develop your intuition" [level=2] [ref=e2847]:
              - link "Navigate to header" [ref=e2848] [cursor=pointer]:
                - /url: "#develop-your-intuition"
                - img [ref=e2850]
              - generic [ref=e2852] [cursor=pointer]: Develop your intuition
            - generic [ref=e2853]: The patterns in this guide aren’t set in stone. They’re starting points that work well in general, but might not be optimal for every situation.
            - generic [ref=e2854]:
              - text: Sometimes you
              - emphasis [ref=e2855]: should
              - text: let context accumulate because you’re deep in one complex problem and the history is valuable. Sometimes you should skip planning and let Claude figure it out because the task is exploratory. Sometimes a vague prompt is exactly right because you want to see how Claude interprets the problem before constraining it.
