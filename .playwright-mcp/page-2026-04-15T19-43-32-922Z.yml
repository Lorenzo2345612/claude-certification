            - generic [ref=e1624]:
              - img "Tip" [ref=e1626]
              - generic [ref=e1629]: Include tests, screenshots, or expected outputs so Claude can check itself. This is the single highest-leverage thing you can do.
            - generic [ref=e1630]: Claude performs dramatically better when it can verify its own work, like run tests, compare screenshots, and validate outputs.
            - generic [ref=e1631]: Without clear success criteria, it might produce something that looks right but actually doesn’t work. You become the only feedback loop, and every mistake requires your attention.
