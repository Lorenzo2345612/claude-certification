                - strong [ref=e2082]: Auto mode
                - text: ": a separate classifier model reviews commands and blocks only what looks risky: scope escalation, unknown infrastructure, or hostile-content-driven actions. Best when you trust the general direction of a task but don’t want to click through every step"
              - listitem [ref=e2083]:
                - strong [ref=e2084]: Permission allowlists
                - text: ": permit specific tools you know are safe, like"
                - code [ref=e2085]: npm run lint
                - text: or
                - code [ref=e2086]: git commit
              - listitem [ref=e2087]:
                - strong [ref=e2088]: Sandboxing
                - text: ": enable OS-level isolation that restricts filesystem and network access, allowing Claude to work more freely within defined boundaries"
