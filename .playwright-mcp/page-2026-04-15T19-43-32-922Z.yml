            - generic [ref=e2784]:
              - text: For uninterrupted execution with background safety checks, use
              - link "auto mode" [ref=e2785] [cursor=pointer]:
                - /url: /docs/en/permission-modes#eliminate-prompts-with-auto-mode
              - text: . A classifier model reviews commands before they run, blocking scope escalation, unknown infrastructure, and hostile-content-driven actions while letting routine work proceed without prompts.
            - generic [ref=e2786]:
              - generic [ref=e2787]:
                - button "Report incorrect code" [ref=e2789] [cursor=pointer]:
