            - paragraph [ref=e1604]: Tips and patterns for getting the most out of Claude Code, from configuring your environment to scaling across parallel sessions.
          - generic [ref=e225]:
            - generic [ref=e1605]: Claude Code is an agentic coding environment. Unlike a chatbot that answers questions and waits, Claude Code can read your files, run commands, make changes, and autonomously work through problems while you watch, redirect, or step away entirely.
            - generic [ref=e1606]: This changes how you work. Instead of writing code yourself and asking Claude to review it, you describe what you want and Claude figures out how to build it. Claude explores, plans, and implements.
            - generic [ref=e1607]: But this autonomy still comes with a learning curve. Claude works within certain constraints you need to understand.
            - generic [ref=e1608]:
              - text: This guide covers patterns that have proven effective across Anthropic’s internal teams and for engineers using Claude Code across various codebases, languages, and environments. For how the agentic loop works under the hood, see
              - link "How Claude Code works" [ref=e1609] [cursor=pointer]:
                - /url: /docs/en/how-claude-code-works
              - text: .
            - separator [ref=e1610]
            - generic [ref=e1611]: "Most best practices are based on one constraint: Claude’s context window fills up fast, and performance degrades as it fills."
            - generic [ref=e1612]: Claude’s context window holds your entire conversation, including every message, every file Claude reads, and every command output. However, this can fill up fast. A single debugging session or codebase exploration might generate and consume tens of thousands of tokens.
            - generic [ref=e1613]:
              - text: This matters since LLM performance degrades as context fills. When the context window is getting full, Claude may start “forgetting” earlier instructions or making more mistakes. The context window is the most important resource to manage. To see how a session fills up in practice,
              - link "watch an interactive walkthrough" [ref=e1614] [cursor=pointer]:
                - /url: /docs/en/context-window
              - text: of what loads at startup and what each file read costs. Track context usage continuously with a
              - link "custom status line" [ref=e1615] [cursor=pointer]:
                - /url: /docs/en/statusline
              - text: ", and see"
              - link "Reduce token usage" [ref=e1616] [cursor=pointer]:
                - /url: /docs/en/costs#reduce-token-usage
              - text: for strategies on reducing token usage.
            - separator [ref=e1617]
            - heading "Navigate to header Give Claude a way to verify its work" [level=2] [ref=e1618]:
