            - paragraph [ref=e277]: Intercept and customize agent behavior at key execution points with hooks
          - generic [ref=e278]:
            - generic [ref=e279]: "Hooks are callback functions that run your code in response to agent events, like a tool being called, a session starting, or execution stopping. With hooks, you can:"
            - list [ref=e280]:
              - listitem [ref=e281]:
                - strong [ref=e282]: Block dangerous operations
                - text: before they execute, like destructive shell commands or unauthorized file access
              - listitem [ref=e283]:
                - strong [ref=e284]: Log and audit
                - text: every tool call for compliance, debugging, or analytics
              - listitem [ref=e285]:
                - strong [ref=e286]: Transform inputs and outputs
                - text: to sanitize data, inject credentials, or redirect file paths
              - listitem [ref=e287]:
                - strong [ref=e288]: Require human approval
                - text: for sensitive actions like database writes or API calls
              - listitem [ref=e289]:
                - strong [ref=e290]: Track session lifecycle
                - text: to manage state, clean up resources, or send notifications
            - generic [ref=e291]: This guide covers how hooks work, how to configure them, and provides examples for common patterns like blocking tools, modifying inputs, and forwarding notifications.
            - heading "Navigate to header How hooks work" [level=2] [ref=e292]:
