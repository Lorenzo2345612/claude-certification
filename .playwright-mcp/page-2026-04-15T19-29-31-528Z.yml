              - text: When you define subagents, Claude determines whether to invoke them based on each subagent’s
              - code [ref=e305]: description
              - text: field. Write clear descriptions that explain when the subagent should be used, and Claude will automatically delegate appropriate tasks. You can also explicitly request a subagent by name in your prompt (for example, “Use the code-reviewer agent to…”).
