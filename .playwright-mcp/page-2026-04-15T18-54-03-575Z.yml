            - generic [ref=e300]: "Treat CLAUDE.md as the place you write down what you’d otherwise re-explain. Add to it when:"
            - list [ref=e301]:
              - listitem [ref=e302]: Claude makes the same mistake a second time
              - listitem [ref=e303]: A code review catches something Claude should have known about this codebase
              - listitem [ref=e304]: You type the same correction or clarification into chat that you typed last session
              - listitem [ref=e305]: A new teammate would need the same context to be productive
            - generic [ref=e306]:
              - text: "Keep it to facts Claude should hold in every session: build commands, conventions, project layout, “always do X” rules. If an entry is a multi-step procedure or only matters for one part of the codebase, move it to a"
