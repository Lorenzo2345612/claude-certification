              - paragraph [ref=e1066]: These limits apply to the combined total across all strict schemas in a single request. For example, if you have 4 strict tools with 6 optional parameters each, you'll reach the 24-parameter limit even though no single tool seems complex.
            - heading "Copy link to clipboard Additional internal limits" [level=4] [ref=e1067]:
              - generic [ref=e1068]:
                - button "Copy link to clipboard" [ref=e1070] [cursor=pointer]:
                  - img [ref=e1072]
                - generic [ref=e1074]: Additional internal limits
            - paragraph [ref=e1075]: "Beyond the explicit limits above, there are additional internal limits on the compiled grammar size. These limits exist because schema complexity doesn't reduce to a single dimension: features like optional parameters, union types, nested objects, and number of tools interact with each other in ways that can make the compiled grammar disproportionately large."
            - paragraph [ref=e1076]:
              - text: When these limits are exceeded, you'll receive a 400 error with the message "Schema is too complex for compilation." These errors mean the combined complexity of your schemas exceeds what can be efficiently compiled, even if each individual limit above is satisfied. As a final stop-gap, the API also enforces a
              - strong [ref=e1077]: compilation timeout of 180 seconds
              - text: . Schemas that pass all explicit checks but produce very large compiled grammars may hit this timeout.
            - heading "Copy link to clipboard Tips for reducing schema complexity" [level=4] [ref=e1078]:
              - generic [ref=e1079]:
                - button "Copy link to clipboard" [ref=e1081] [cursor=pointer]:
                  - img [ref=e1083]
                - generic [ref=e1085]: Tips for reducing schema complexity
            - paragraph [ref=e1086]: "If you're hitting complexity limits, try these strategies in order:"
            - list [ref=e1087]:
              - listitem [ref=e1088]:
                - paragraph [ref=e1089]:
                  - strong [ref=e1090]: Mark only critical tools as strict.
                  - text: If you have many tools, reserve it for tools where schema violations cause real problems, and rely on Claude's natural adherence for simpler tools.
              - listitem [ref=e1091]:
                - paragraph [ref=e1092]:
                  - strong [ref=e1093]: Reduce optional parameters.
                  - text: Make parameters
                  - code [ref=e1094]: required
                  - text: where possible. Each optional parameter roughly doubles a portion of the grammar's state space. If a parameter always has a reasonable default, consider making it required and having Claude provide that default explicitly.
              - listitem [ref=e1095]:
                - paragraph [ref=e1096]:
                  - strong [ref=e1097]: Simplify nested structures.
                  - text: Deeply nested objects with optional fields compound the complexity. Flatten structures where possible.
              - listitem [ref=e1098]:
                - paragraph [ref=e1099]:
                  - strong [ref=e1100]: Split into multiple requests.
                  - text: If you have many strict tools, consider splitting them across separate requests or sub-agents.
            - paragraph [ref=e1101]:
              - text: For persistent issues with valid schemas,
              - link "contact support" [ref=e1102] [cursor=pointer]:
                - /url: https://support.claude.com/en/articles/9015913-how-to-get-support
              - text: with your schema definition.
            - heading "Copy link to clipboard Data retention" [level=2] [ref=e1103]:
              - generic [ref=e1104]:
                - button "Copy link to clipboard" [ref=e1106] [cursor=pointer]:
                  - img [ref=e1108]
                - generic [ref=e1110]: Data retention
            - paragraph [ref=e1111]: Prompts and responses are processed with ZDR when using structured outputs. However, the JSON schema itself is temporarily cached for up to 24 hours since last use for optimization purposes. No prompt or response data is retained beyond the API response.
            - paragraph [ref=e1112]:
              - text: Structured outputs are HIPAA eligible, but
              - strong [ref=e1113]: PHI must not be included in JSON schema definitions
              - text: . The API compiles JSON schemas into grammars that are cached separately from message content, and these cached schemas do not receive the same PHI protections as prompts and responses. Do not include PHI in schema property names,
              - code [ref=e1114]: enum
              - text: values,
              - code [ref=e1115]: const
              - text: values, or
              - code [ref=e1116]: pattern
              - text: regular expressions. PHI should only appear in message content (prompts and responses), where it is protected under HIPAA safeguards.
            - paragraph [ref=e1117]:
