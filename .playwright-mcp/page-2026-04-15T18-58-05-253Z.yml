            - paragraph [ref=e851]: "Structured outputs use constrained sampling with compiled grammar artifacts. This introduces some performance characteristics to be aware of:"
            - list [ref=e852]:
              - listitem [ref=e853]:
                - text: •
                - strong [ref=e854]: "First request latency:"
                - text: The first time you use a specific schema, there is additional latency while the grammar compiles
              - listitem [ref=e855]:
                - text: •
                - strong [ref=e856]: "Automatic caching:"
                - text: Compiled grammars are cached for 24 hours from last use, making subsequent requests much faster
              - listitem [ref=e857]:
                - text: •
                - strong [ref=e858]: "Cache invalidation:"
                - text: "The cache is invalidated if you change:"
                - list [ref=e859]:
                  - listitem [ref=e860]: • The JSON schema structure
                  - listitem [ref=e861]: • The set of tools in your request (when using both structured outputs and tool use)
                  - listitem [ref=e862]:
                    - text: • Changing only
                    - code [ref=e863]: name
                    - text: or
                    - code [ref=e864]: description
                    - text: fields does not invalidate the cache
            - heading "Copy link to clipboard Prompt modification and token costs" [level=3] [ref=e865]:
