              - text: appear in the typeahead as
              - code [ref=e1639]: <plugin-name>:<agent-name>
              - text: ". Named background subagents currently running in the session also appear in the typeahead, showing their status next to the name. You can also type the mention manually without using the picker:"
              - code [ref=e1640]: "@agent-<name>"
              - text: for local subagents, or
