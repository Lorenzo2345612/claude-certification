            - generic [ref=e1571]:
              - text: Claude automatically delegates tasks based on the task description in your request, the
              - code [ref=e1572]: description
              - text: field in subagent configurations, and current context. To encourage proactive delegation, include phrases like “use proactively” in your subagent’s description field.
