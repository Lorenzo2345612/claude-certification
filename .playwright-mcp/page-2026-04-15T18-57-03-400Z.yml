            - paragraph [ref=e171]: Create and use specialized AI subagents in Claude Code for task-specific workflows and improved context management.
          - generic [ref=e172]:
            - generic [ref=e173]: "Subagents are specialized AI assistants that handle specific types of tasks. Use one when a side task would flood your main conversation with search results, logs, or file contents you won’t reference again: the subagent does that work in its own context and returns only the summary. Define a custom subagent when you keep spawning the same kind of worker with the same instructions."
            - generic [ref=e174]:
              - text: Each subagent runs in its own context window with a custom system prompt, specific tool access, and independent permissions. When Claude encounters a task that matches a subagent’s description, it delegates to that subagent, which works independently and returns results. To see the context savings in practice, the
              - link "context window visualization" [ref=e175] [cursor=pointer]:
                - /url: /docs/en/context-window
              - text: walks through a session where a subagent handles research in its own separate window.
            - generic [ref=e176]:
              - img "Note" [ref=e178]
              - generic [ref=e181]:
                - text: If you need multiple agents working in parallel and communicating with each other, see
                - link "agent teams" [ref=e182] [cursor=pointer]:
                  - /url: /docs/en/agent-teams
                - text: instead. Subagents work within a single session; agent teams coordinate across separate sessions.
            - generic [ref=e183]: "Subagents help you:"
            - list [ref=e184]:
              - listitem [ref=e185]:
                - strong [ref=e186]: Preserve context
                - text: by keeping exploration and implementation out of your main conversation
              - listitem [ref=e187]:
                - strong [ref=e188]: Enforce constraints
                - text: by limiting which tools a subagent can use
              - listitem [ref=e189]:
                - strong [ref=e190]: Reuse configurations
                - text: across projects with user-level subagents
              - listitem [ref=e191]:
                - strong [ref=e192]: Specialize behavior
                - text: with focused system prompts for specific domains
              - listitem [ref=e193]:
                - strong [ref=e194]: Control costs
                - text: by routing tasks to faster, cheaper models like Haiku
            - generic [ref=e195]: Claude uses each subagent’s description to decide when to delegate tasks. When you create a subagent, write a clear description so Claude knows when to use it.
