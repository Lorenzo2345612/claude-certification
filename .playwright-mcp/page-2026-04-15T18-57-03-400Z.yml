                - img [ref=e1729]
              - generic [ref=e1731] [cursor=pointer]: Common patterns
            - heading "Navigate to header Isolate high-volume operations" [level=4] [ref=e1732]:
              - link "Navigate to header" [ref=e1733] [cursor=pointer]:
                - /url: "#isolate-high-volume-operations"
                - img [ref=e1735]
              - generic [ref=e1737] [cursor=pointer]: Isolate high-volume operations
            - generic [ref=e1738]: One of the most effective uses for subagents is isolating operations that produce large amounts of output. Running tests, fetching documentation, or processing log files can consume significant context. By delegating these to a subagent, the verbose output stays in the subagent’s context while only the relevant summary returns to your main conversation.
            - generic [ref=e1739]:
              - generic [ref=e1740]:
                - button "Report incorrect code" [ref=e1742] [cursor=pointer]:
                  - img [ref=e1743]
                - button "Copy the contents from the code block" [ref=e1746] [cursor=pointer]:
                  - img [ref=e1747]
                - button "Ask AI" [ref=e1751] [cursor=pointer]:
                  - img [ref=e1752]
              - code [ref=e1758]:
                - generic [ref=e1759]: Use a subagent to run the test suite and report only the failing tests with their error messages
            - heading "Navigate to header Run parallel research" [level=4] [ref=e1760]:
              - link "Navigate to header" [ref=e1761] [cursor=pointer]:
                - /url: "#run-parallel-research"
                - img [ref=e1763]
              - generic [ref=e1765] [cursor=pointer]: Run parallel research
            - generic [ref=e1766]: "For independent investigations, spawn multiple subagents to work simultaneously:"
            - generic [ref=e1767]:
              - generic [ref=e1768]:
                - button "Report incorrect code" [ref=e1770] [cursor=pointer]:
                  - img [ref=e1771]
                - button "Copy the contents from the code block" [ref=e1774] [cursor=pointer]:
                  - img [ref=e1775]
                - button "Ask AI" [ref=e1779] [cursor=pointer]:
                  - img [ref=e1780]
              - code [ref=e1786]:
                - generic [ref=e1787]: Research the authentication, database, and API modules in parallel using separate subagents
            - generic [ref=e1788]: Each subagent explores its area independently, then Claude synthesizes the findings. This works best when the research paths don’t depend on each other.
            - generic [ref=e1789]:
              - img "Warning" [ref=e1791]
              - generic [ref=e1794]: When subagents complete, their results return to your main conversation. Running many subagents that each return detailed results can consume significant context.
            - generic [ref=e1795]:
              - text: For tasks that need sustained parallelism or exceed your context window,
              - link "agent teams" [ref=e1796] [cursor=pointer]:
                - /url: /docs/en/agent-teams
              - text: give each worker its own independent context.
            - heading "Navigate to header Chain subagents" [level=4] [ref=e1797]:
              - link "Navigate to header" [ref=e1798] [cursor=pointer]:
                - /url: "#chain-subagents"
                - img [ref=e1800]
              - generic [ref=e1802] [cursor=pointer]: Chain subagents
            - generic [ref=e1803]: For multi-step workflows, ask Claude to use subagents in sequence. Each subagent completes its task and returns results to Claude, which then passes relevant context to the next subagent.
            - generic [ref=e1804]:
              - generic [ref=e1805]:
                - button "Report incorrect code" [ref=e1807] [cursor=pointer]:
