              - generic [ref=e1578] [cursor=pointer]: Invoke subagents explicitly
            - generic [ref=e1579]: "When automatic delegation isn’t enough, you can request a subagent yourself. Three patterns escalate from a one-off suggestion to a session-wide default:"
            - list [ref=e1580]:
              - listitem [ref=e1581]:
                - strong [ref=e1582]: Natural language
                - text: ": name the subagent in your prompt; Claude decides whether to delegate"
              - listitem [ref=e1583]:
                - strong [ref=e1584]: "@-mention"
                - text: ": guarantees the subagent runs for one task"
              - listitem [ref=e1585]:
                - strong [ref=e1586]: Session-wide
                - text: ": the whole session uses that subagent’s system prompt, tool restrictions, and model via the"
                - code [ref=e1587]: "--agent"
                - text: flag or the
                - code [ref=e1588]: agent
                - text: setting
            - generic [ref=e1589]: "For natural language, there’s no special syntax. Name the subagent and Claude typically delegates:"
            - generic [ref=e1590]:
