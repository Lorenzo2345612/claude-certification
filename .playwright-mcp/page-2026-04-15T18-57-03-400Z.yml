              - code [ref=e1823]:
                - generic [ref=e1824]: Use the code-reviewer subagent to find performance issues, then use the optimizer subagent to fix them
            - heading "Navigate to header Choose between subagents and main conversation" [level=3] [ref=e1825]:
              - link "Navigate to header" [ref=e1826] [cursor=pointer]:
                - /url: "#choose-between-subagents-and-main-conversation"
