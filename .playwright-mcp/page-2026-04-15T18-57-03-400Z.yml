              - text: Pass
              - link "--agent <name>" [ref=e1644] [cursor=pointer]:
                - /url: /docs/en/cli-reference
                - code [ref=e1645]: "--agent <name>"
              - text: "to start a session where the main thread itself takes on that subagent’s system prompt, tool restrictions, and model:"
