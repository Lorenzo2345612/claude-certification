                - generic [ref=e1901]: "[Claude resumes the subagent with full context from previous conversation]"
            - generic [ref=e1902]:
              - text: If a stopped subagent receives a
              - code [ref=e1903]: SendMessage
              - text: ", it auto-resumes in the background without requiring a new"
              - code [ref=e1904]: Agent
              - text: invocation.
