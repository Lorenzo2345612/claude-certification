                - generic [ref=e1611]: Have the code-reviewer subagent look at my recent changes
            - generic [ref=e1612]:
              - strong [ref=e1613]: "@-mention the subagent."
              - text: Type
              - code [ref=e1614]: "@"
              - text: "and pick the subagent from the typeahead, the same way you @-mention files. This ensures that specific subagent runs rather than leaving the choice to Claude:"
            - generic [ref=e1615]:
              - generic [ref=e1616]:
                - button "Report incorrect code" [ref=e1618] [cursor=pointer]:
                  - img [ref=e1619]
                - button "Copy the contents from the code block" [ref=e1622] [cursor=pointer]:
                  - img [ref=e1623]
                - button "Ask AI" [ref=e1627] [cursor=pointer]:
                  - img [ref=e1628]
              - code [ref=e1634]:
                - generic [ref=e1635]: "@\"code-reviewer (agent)\" look at the auth changes"
            - generic [ref=e1636]: Your full message still goes to Claude, which writes the subagent’s task prompt based on what you asked. The @-mention controls which subagent Claude invokes, not what prompt it receives.
            - generic [ref=e1637]:
              - text: Subagents provided by an enabled
              - link "plugin" [ref=e1638] [cursor=pointer]:
