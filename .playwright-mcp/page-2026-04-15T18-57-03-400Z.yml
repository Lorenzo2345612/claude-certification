              - code [ref=e2209]:
                - generic [ref=e2210]: "#!/bin/bash"
                - generic [ref=e2211]: "# Blocks SQL write operations, allows SELECT queries"
                - generic [ref=e2212]: "# Read JSON input from stdin"
                - generic [ref=e2213]: INPUT=$(cat)
                - generic [ref=e2214]: "# Extract the command field from tool_input using jq"
                - generic [ref=e2215]: COMMAND=$(echo "$INPUT" | jq -r '.tool_input.command // empty')
                - generic [ref=e2216]: if [ -z "$COMMAND" ]; then
                - generic [ref=e2217]: exit 0
                - generic [ref=e2218]: fi
                - generic [ref=e2219]: "# Block write operations (case-insensitive)"
                - generic [ref=e2220]: if echo "$COMMAND" | grep -iE '\b(INSERT|UPDATE|DELETE|DROP|CREATE|ALTER|TRUNCATE|REPLACE|MERGE)\b' > /dev/null; then
                - generic [ref=e2221]: "echo \"Blocked: Write operations not allowed. Use SELECT queries only.\" >&2"
                - generic [ref=e2222]: exit 2
                - generic [ref=e2223]: fi
                - generic [ref=e2224]: exit 0
            - generic [ref=e2225]: "Make the script executable:"
