            - generic [ref=e1831]:
              - text: Use the
              - strong [ref=e1832]: main conversation
              - text: "when:"
            - list [ref=e1833]:
              - listitem [ref=e1834]: The task needs frequent back-and-forth or iterative refinement
              - listitem [ref=e1835]: Multiple phases share significant context (planning → implementation → testing)
              - listitem [ref=e1836]: You’re making a quick, targeted change
              - listitem [ref=e1837]: Latency matters. Subagents start fresh and may need time to gather context
            - generic [ref=e1838]:
              - text: Use
