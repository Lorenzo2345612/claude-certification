            - heading "Navigate to header Run subagents in foreground or background" [level=3] [ref=e1702]:
              - link "Navigate to header" [ref=e1703] [cursor=pointer]:
                - /url: "#run-subagents-in-foreground-or-background"
                - img [ref=e1705]
              - generic [ref=e1707] [cursor=pointer]: Run subagents in foreground or background
            - generic [ref=e1708]: "Subagents can run in the foreground (blocking) or background (concurrent):"
            - list [ref=e1709]:
              - listitem [ref=e1710]:
                - strong [ref=e1711]: Foreground subagents
                - text: block the main conversation until complete. Permission prompts and clarifying questions (like
                - link "AskUserQuestion" [ref=e1712] [cursor=pointer]:
                  - /url: /docs/en/tools-reference
                  - code [ref=e1713]: AskUserQuestion
                - text: ) are passed through to you.
              - listitem [ref=e1714]:
                - strong [ref=e1715]: Background subagents
                - text: run concurrently while you continue working. Before launching, Claude Code prompts for any tool permissions the subagent will need, ensuring it has the necessary approvals upfront. Once running, the subagent inherits these permissions and auto-denies anything not pre-approved. If a background subagent needs to ask clarifying questions, that tool call fails but the subagent continues.
            - generic [ref=e1716]: If a background subagent fails due to missing permissions, you can start a new foreground subagent with the same task to retry with interactive prompts.
            - generic [ref=e1717]: "Claude decides whether to run subagents in the foreground or background based on the task. You can also:"
            - list [ref=e1718]:
              - listitem [ref=e1719]: Ask Claude to “run this in the background”
              - listitem [ref=e1720]:
                - text: Press
                - strong [ref=e1721]: Ctrl+B
                - text: to background a running task
            - generic [ref=e1722]:
              - text: To disable all background task functionality, set the
              - code [ref=e1723]: CLAUDE_CODE_DISABLE_BACKGROUND_TASKS
              - text: environment variable to
              - code [ref=e1724]: "1"
              - text: . See
              - link "Environment variables" [ref=e1725] [cursor=pointer]:
                - /url: /docs/en/env-vars
              - text: .
            - heading "Navigate to header Common patterns" [level=3] [ref=e1726]:
