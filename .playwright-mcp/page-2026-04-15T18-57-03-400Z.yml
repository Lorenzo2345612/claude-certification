              - generic [ref=e1868] [cursor=pointer]: Resume subagents
            - generic [ref=e1869]: Each subagent invocation creates a new instance with fresh context. To continue an existing subagent’s work instead of starting over, ask Claude to resume it.
            - generic [ref=e1870]: Resumed subagents retain their full conversation history, including all previous tool calls, results, and reasoning. The subagent picks up exactly where it stopped rather than starting fresh.
            - generic [ref=e1871]:
              - text: When a subagent completes, Claude receives its agent ID. Claude uses the
              - code [ref=e1872]: SendMessage
              - text: tool with the agent’s ID as the
              - code [ref=e1873]: to
              - text: field to resume it. The
              - code [ref=e1874]: SendMessage
              - text: tool is only available when
              - link "agent teams" [ref=e1875] [cursor=pointer]:
                - /url: /docs/en/agent-teams
              - text: are enabled via
              - code [ref=e1876]: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
              - text: .
            - generic [ref=e1877]: "To resume a subagent, ask Claude to continue the previous work:"
            - generic [ref=e1878]:
              - generic [ref=e1879]:
                - button "Report incorrect code" [ref=e1881] [cursor=pointer]:
