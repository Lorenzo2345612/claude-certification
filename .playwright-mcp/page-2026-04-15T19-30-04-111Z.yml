              - listitem [ref=e421]:
                - generic [ref=e422]:
                  - generic [ref=e423]: "2"
                  - paragraph [ref=e424]: Tool result handling (turn 2)
                - list [ref=e427]:
                  - listitem [ref=e428]:
                    - text: •
                    - strong [ref=e429]: "Input components:"
                    - text: Every block in the first turn as well as the
                    - code [ref=e430]: tool_result
                    - text: . The extended thinking block
                    - strong [ref=e431]: must
                    - text: be returned with the corresponding tool results. This is the only case wherein you
                    - strong [ref=e432]: have to
                    - text: return thinking blocks.
                  - listitem [ref=e433]:
                    - text: •
                    - strong [ref=e434]: "Output components:"
                    - text: After tool results have been passed back to Claude, Claude will respond with only text (no additional extended thinking until the next
                    - code [ref=e435]: user
                    - text: message).
                  - listitem [ref=e436]:
                    - text: •
                    - strong [ref=e437]: "Token calculation:"
                    - text: All input and output components count toward the context window, and all output components are billed as output tokens.
              - listitem [ref=e438]:
                - generic [ref=e439]:
                  - generic [ref=e440]: "3"
                  - paragraph [ref=e441]: Third Step
                - list [ref=e444]:
                  - listitem [ref=e445]:
                    - text: •
                    - strong [ref=e446]: "Input components:"
                    - text: All inputs and the output from the previous turn is carried forward with the exception of the thinking block, which can be dropped now that Claude has completed the entire tool use cycle. The API will automatically strip the thinking block for you if you pass it back, or you can feel free to strip it yourself at this stage. This is also where you would add the next
                    - code [ref=e447]: User
                    - text: turn.
                  - listitem [ref=e448]:
                    - text: •
                    - strong [ref=e449]: "Output components:"
                    - text: Since there is a new
                    - code [ref=e450]: User
                    - text: turn outside of the tool use cycle, Claude generates a new extended thinking block and continues from there.
                  - listitem [ref=e451]:
                    - text: •
                    - strong [ref=e452]: "Token calculation:"
                    - text: Previous thinking tokens are automatically stripped from context window calculations. All other previous blocks still count as part of the token window, and the thinking block in the current
                    - code [ref=e453]: Assistant
                    - text: turn counts as part of the context window.
            - list [ref=e454]:
              - listitem [ref=e455]:
                - text: •
                - strong [ref=e456]: "Considerations for tool use with extended thinking:"
                - list [ref=e457]:
                  - listitem [ref=e458]: • When posting tool results, the entire unmodified thinking block that accompanies that specific tool request (including signature portions) must be included.
                  - listitem [ref=e459]:
                    - text: "• The effective context window calculation for extended thinking with tool use becomes:"
                    - code [ref=e460]: context_window = input_tokens + current_turn_tokens
                    - text: .
                  - listitem [ref=e461]: • The system uses cryptographic signatures to verify thinking block authenticity. Failing to preserve thinking blocks during tool use can break Claude's reasoning continuity. Thus, if you modify thinking blocks, the API returns an error.
            - generic [ref=e462]:
              - img [ref=e465]
              - generic [ref=e467]:
                - paragraph [ref=e468]:
                  - text: Claude 4 models support
                  - link "interleaved thinking" [ref=e469] [cursor=pointer]:
                    - /url: /docs/en/build-with-claude/extended-thinking#interleaved-thinking
                  - text: ", which enables Claude to think between tool calls and make more sophisticated reasoning after receiving tool results."
                - paragraph [ref=e470]:
                  - text: Claude Sonnet 3.7 does not support interleaved thinking, so there is no interleaving of extended thinking and tool calls without a non-
                  - code [ref=e471]: tool_result
                  - text: user turn in between.
                - paragraph [ref=e472]:
                  - text: For more information about using tools with extended thinking, see the
                  - link "extended thinking guide" [ref=e473] [cursor=pointer]:
                    - /url: /docs/en/build-with-claude/extended-thinking#extended-thinking-with-tool-use
                  - text: .
            - paragraph [ref=e474]:
              - link "Claude Mythos Preview" [ref=e475] [cursor=pointer]:
                - /url: https://anthropic.com/glasswing
              - text: ", Claude Opus 4.6, and Claude Sonnet 4.6 have a 1M-token context window. Other Claude models, including Claude Sonnet 4.5 and Sonnet 4 (deprecated), have a 200k-token context window."
            - paragraph [ref=e476]:
              - text: A single request can include up to 600 images or PDF pages (100 for models with a 200k-token context window). When sending many images or large documents, you may approach
              - link "request size limits" [ref=e477] [cursor=pointer]:
                - /url: /docs/en/api/overview#request-size-limits
              - text: before the token limit.
            - heading "Copy link to clipboard Context awareness in Claude Sonnet 4.6, Sonnet 4.5, and Haiku 4.5" [level=2] [ref=e478]:
              - generic [ref=e479]:
                - button "Copy link to clipboard" [ref=e481] [cursor=pointer]:
                  - img [ref=e483]
                - generic [ref=e485]: Context awareness in Claude Sonnet 4.6, Sonnet 4.5, and Haiku 4.5
            - paragraph [ref=e486]:
              - text: Claude Sonnet 4.6, Claude Sonnet 4.5, and Claude Haiku 4.5 feature
              - strong [ref=e487]: context awareness
              - text: . This capability lets these models track their remaining context window (i.e. "token budget") throughout a conversation. This enables Claude to execute tasks and manage context more effectively by understanding how much space it has to work. Claude is trained to use this context precisely, persisting in the task until the very end rather than guessing how many tokens remain. For a model, lacking context awareness is like competing in a cooking show without a clock. Claude 4.5+ models change this by explicitly informing the model about its remaining context, so it can take maximum advantage of the available tokens.
            - paragraph [ref=e488]:
              - strong [ref=e489]: "How it works:"
            - paragraph [ref=e490]: "At the start of a conversation, Claude receives information about its total context window:"
            - generic [ref=e491]:
              - code [ref=e495]:
                - generic [ref=e496]: <budget:token_budget>1000000</budget:token_budget>
              - button "Copy code" [ref=e498] [cursor=pointer]:
                - generic [ref=e499]:
                  - img [ref=e501]
                  - img [ref=e504]
            - paragraph [ref=e506]: The budget is set to 1M tokens (200k for models with a smaller context window).
            - paragraph [ref=e507]: "After each tool call, Claude receives an update on remaining capacity:"
            - generic [ref=e508]:
              - code [ref=e512]:
                - generic [ref=e513]: "<system_warning>Token usage: 35000/1000000; 965000 remaining</system_warning>"
              - button "Copy code" [ref=e515] [cursor=pointer]:
                - generic [ref=e516]:
                  - img [ref=e518]
                  - img [ref=e521]
            - paragraph [ref=e523]: This awareness helps Claude determine how much capacity remains for work and enables more effective execution on long-running tasks. Image tokens are included in these budgets.
            - paragraph [ref=e524]:
              - strong [ref=e525]: "Benefits:"
            - paragraph [ref=e526]: "Context awareness is particularly valuable for:"
            - list [ref=e527]:
              - listitem [ref=e528]: • Long-running agent sessions that require sustained focus
              - listitem [ref=e529]: • Multi-context-window workflows where state transitions matter
              - listitem [ref=e530]: • Complex tasks requiring careful token management
            - generic [ref=e531]:
              - img [ref=e534]
              - paragraph [ref=e537]:
                - text: For agents that span multiple sessions, design your state artifacts so that context recovery is fast when a new session starts. The
                - link "memory tool's multi-session pattern" [ref=e538] [cursor=pointer]:
                  - /url: /docs/en/agents-and-tools/tool-use/memory-tool#multi-session-software-development-pattern
                - text: walks through a concrete approach. See also
                - link "Effective harnesses for long-running agents" [ref=e539] [cursor=pointer]:
                  - /url: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
                - text: .
            - paragraph [ref=e540]:
              - text: For prompting guidance on leveraging context awareness, see the
              - link "prompting best practices guide" [ref=e541] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#context-awareness-and-multi-window-workflows
              - text: .
            - heading "Copy link to clipboard Managing context with compaction" [level=2] [ref=e542]:
              - generic [ref=e543]:
                - button "Copy link to clipboard" [ref=e545] [cursor=pointer]:
                  - img [ref=e547]
                - generic [ref=e549]: Managing context with compaction
            - paragraph [ref=e550]:
              - text: If your conversations regularly approach context window limits,
              - link "server-side compaction" [ref=e551] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/compaction
              - text: is the recommended approach. Compaction provides server-side summarization that automatically condenses earlier parts of a conversation, enabling long-running conversations beyond context limits with minimal integration work. It is currently available in beta for Claude Opus 4.6 and Sonnet 4.6.
            - paragraph [ref=e552]:
              - text: For more specialized needs,
              - link "context editing" [ref=e553] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/context-editing
              - text: "offers additional strategies:"
            - list [ref=e554]:
              - listitem [ref=e555]:
                - text: •
                - strong [ref=e556]: Tool result clearing
                - text: "- Clear old tool results in agentic workflows"
              - listitem [ref=e557]:
                - text: •
                - strong [ref=e558]: Thinking block clearing
                - text: "- Manage thinking blocks with extended thinking"
            - heading "Copy link to clipboard Context window management with newer Claude models" [level=2] [ref=e559]:
              - generic [ref=e560]:
                - button "Copy link to clipboard" [ref=e562] [cursor=pointer]:
                  - img [ref=e564]
                - generic [ref=e566]: Context window management with newer Claude models
            - paragraph [ref=e567]: Newer Claude models (starting with Claude Sonnet 3.7) return a validation error when prompt and output tokens exceed the context window, rather than silently truncating. This change provides more predictable behavior but requires more careful token management.
            - paragraph [ref=e568]:
              - text: Use the
              - link "token counting API" [ref=e569] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/token-counting
              - text: to estimate token usage before sending messages to Claude. This helps you plan and stay within context window limits.
