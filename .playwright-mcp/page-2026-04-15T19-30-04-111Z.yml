            - list [ref=e407]:
              - listitem [ref=e408]:
                - generic [ref=e409]:
                  - generic [ref=e410]: "1"
                  - paragraph [ref=e411]: First turn architecture
                - list [ref=e414]:
                  - listitem [ref=e415]:
                    - text: •
                    - strong [ref=e416]: "Input components:"
                    - text: Tools configuration and user message
                  - listitem [ref=e417]:
                    - text: •
                    - strong [ref=e418]: "Output components:"
                    - text: Extended thinking + text response + tool use request
                  - listitem [ref=e419]:
                    - text: •
                    - strong [ref=e420]: "Token calculation:"
