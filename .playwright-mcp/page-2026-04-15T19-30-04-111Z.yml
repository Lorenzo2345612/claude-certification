            - generic [ref=e301]:
              - img [ref=e304]
              - paragraph [ref=e307]:
                - text: This feature is eligible for
                - link "Zero Data Retention (ZDR)" [ref=e308] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/api-and-data-retention
                - text: . When your organization has a ZDR arrangement, data sent through this feature is not stored after the API response is returned.
            - paragraph [ref=e309]: As conversations grow, you'll eventually approach context window limits. This guide explains how context windows work and introduces strategies for managing them effectively.
            - paragraph [ref=e310]:
              - text: For long-running conversations and agentic workflows,
              - link "server-side compaction" [ref=e311] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/compaction
              - text: is the primary strategy for context management. For more specialized needs,
              - link "context editing" [ref=e312] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/context-editing
              - text: offers additional strategies like tool result clearing and thinking block clearing.
            - heading "Copy link to clipboard Understanding the context window" [level=2] [ref=e313]:
              - generic [ref=e314]:
                - button "Copy link to clipboard" [ref=e316] [cursor=pointer]:
                  - img [ref=e318]
                - generic [ref=e320]: Understanding the context window
            - paragraph [ref=e321]:
              - text: The "context window" refers to all the text a language model can reference when generating a response, including the response itself. This is different from the large corpus of data the language model was trained on, and instead represents a "working memory" for the model. A larger context window allows the model to handle more complex and lengthy prompts, but more context isn't automatically better. As token count grows, accuracy and recall degrade, a phenomenon known as
              - emphasis [ref=e322]: context rot
              - text: . This makes curating what's in context just as important as how much space is available.
            - paragraph [ref=e323]:
              - text: Claude achieves state-of-the-art results on long-context retrieval benchmarks like
              - link "MRCR" [ref=e324] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2501.03276
              - text: and
              - link "GraphWalks" [ref=e325] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2412.04360
              - text: ", but these gains depend on what's in context, not just how much fits."
            - generic [ref=e326]:
              - img [ref=e329]
              - paragraph [ref=e332]:
                - text: For a deep dive into why long contexts degrade and how to engineer around it, see
                - link "Effective context engineering" [ref=e333] [cursor=pointer]:
                  - /url: https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents
                - text: .
            - paragraph [ref=e334]:
              - text: The diagram below illustrates the standard context window behavior for API requests
              - superscript [ref=e335]: "1"
              - text: ":"
            - paragraph [ref=e336]:
              - img "Context window diagram" [ref=e337]
            - paragraph [ref=e338]:
              - emphasis [ref=e339]:
                - superscript [ref=e340]: "1"
                - text: For chat interfaces, such as for
                - link "claude.ai" [ref=e341] [cursor=pointer]:
                  - /url: https://claude.ai/
                - text: ", context windows can also be set up on a rolling \"first in, first out\" system."
            - list [ref=e342]:
              - listitem [ref=e343]:
                - text: •
                - strong [ref=e344]: "Progressive token accumulation:"
                - text: As the conversation advances through turns, each user message and assistant response accumulates within the context window. Previous turns are preserved completely.
              - listitem [ref=e345]:
                - text: •
                - strong [ref=e346]: "Linear growth pattern:"
                - text: The context usage grows linearly with each turn, with previous turns preserved completely.
              - listitem [ref=e347]:
                - text: •
                - strong [ref=e348]: "Context window capacity:"
                - text: The total available context window (up to 1M tokens) represents the maximum capacity for storing conversation history and generating new output from Claude.
              - listitem [ref=e349]:
                - text: •
                - strong [ref=e350]: "Input-output flow:"
                - text: "Each turn consists of:"
                - list [ref=e351]:
                  - listitem [ref=e352]:
                    - text: •
                    - strong [ref=e353]: "Input phase:"
                    - text: Contains all previous conversation history plus the current user message
                  - listitem [ref=e354]:
                    - text: •
                    - strong [ref=e355]: "Output phase:"
                    - text: Generates a text response that becomes part of a future input
            - heading "Copy link to clipboard The context window with extended thinking" [level=2] [ref=e356]:
              - generic [ref=e357]:
                - button "Copy link to clipboard" [ref=e359] [cursor=pointer]:
                  - img [ref=e361]
                - generic [ref=e363]: The context window with extended thinking
            - paragraph [ref=e364]:
              - text: When using
              - link "extended thinking" [ref=e365] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/extended-thinking
              - text: ", all input and output tokens, including the tokens used for thinking, count toward the context window limit, with a few nuances in multi-turn situations."
            - paragraph [ref=e366]:
              - text: The thinking budget tokens are a subset of your
              - code [ref=e367]: max_tokens
              - text: parameter, are billed as output tokens, and count towards rate limits. With
              - link "adaptive thinking" [ref=e368] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/adaptive-thinking
              - text: ", Claude dynamically decides its thinking allocation, so actual thinking token usage may vary per request."
            - paragraph [ref=e369]: However, previous thinking blocks are automatically stripped from the context window calculation by the Claude API and are not part of the conversation history that the model "sees" for subsequent turns, preserving token capacity for actual conversation content.
            - paragraph [ref=e370]: "The diagram below demonstrates the specialized token management when extended thinking is enabled:"
            - paragraph [ref=e371]:
              - img "Context window diagram with extended thinking" [ref=e372]
            - list [ref=e373]:
              - listitem [ref=e374]:
                - text: •
                - strong [ref=e375]: "Stripping extended thinking:"
                - text: Extended thinking blocks (shown in dark gray) are generated during each turn's output phase,
                - strong [ref=e376]: but are not carried forward as input tokens for subsequent turns
                - text: . You do not need to strip the thinking blocks yourself. The Claude API automatically does this for you if you pass them back.
              - listitem [ref=e377]:
                - text: •
                - strong [ref=e378]: "Technical implementation details:"
                - list [ref=e379]:
                  - listitem [ref=e380]: • The API automatically excludes thinking blocks from previous turns when you pass them back as part of the conversation history.
                  - listitem [ref=e381]: • Extended thinking tokens are billed as output tokens only once, during their generation.
                  - listitem [ref=e382]:
                    - text: "• The effective context window calculation becomes:"
                    - code [ref=e383]: context_window = (input_tokens - previous_thinking_tokens) + current_turn_tokens
                    - text: .
                  - listitem [ref=e384]:
                    - text: • Thinking tokens include
                    - code [ref=e385]: thinking
                    - text: blocks.
            - paragraph [ref=e386]: This architecture is token efficient and allows for extensive reasoning without token waste, as thinking blocks can be substantial in length.
            - generic [ref=e387]:
              - img [ref=e390]
              - paragraph [ref=e393]:
                - text: You can read more about the context window and extended thinking in the
                - link "extended thinking guide" [ref=e394] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/extended-thinking
                - text: .
            - heading "Copy link to clipboard The context window with extended thinking and tool use" [level=2] [ref=e395]:
