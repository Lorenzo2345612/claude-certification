                - strong [ref=e486]: medium effort
                - text: as a balanced option when you want solid performance without the full token expenditure of high effort.
              - listitem [ref=e487]:
                - text: • Use
                - strong [ref=e488]: low effort
                - text: when you're optimizing for speed (because Claude answers with fewer tokens) or cost. For example, simple classification tasks, quick lookups, or high-volume use cases where marginal quality improvements don't justify additional latency or spend.
            - heading "Copy link to clipboard Effort with tool use" [level=2] [ref=e489]:
              - generic [ref=e490]:
                - button "Copy link to clipboard" [ref=e492] [cursor=pointer]:
                  - img [ref=e494]
                - generic [ref=e496]: Effort with tool use
            - paragraph [ref=e497]: "When using tools, the effort parameter affects both the explanations around tool calls and the tool calls themselves. Lower effort levels tend to:"
            - list [ref=e498]:
              - listitem [ref=e499]: • Combine multiple operations into fewer tool calls
              - listitem [ref=e500]: • Make fewer tool calls
              - listitem [ref=e501]: • Proceed directly to action without preamble
              - listitem [ref=e502]: • Use terse confirmation messages after completion
            - paragraph [ref=e503]: "Higher effort levels may:"
            - list [ref=e504]:
              - listitem [ref=e505]: • Make more tool calls
              - listitem [ref=e506]: • Explain the plan before taking action
              - listitem [ref=e507]: • Provide detailed summaries of changes
              - listitem [ref=e508]: • Include more comprehensive code comments
            - heading "Copy link to clipboard Effort with extended thinking" [level=2] [ref=e509]:
              - generic [ref=e510]:
                - button "Copy link to clipboard" [ref=e512] [cursor=pointer]:
                  - img [ref=e514]
                - generic [ref=e516]: Effort with extended thinking
            - paragraph [ref=e517]: "The effort parameter works alongside extended thinking. Its behavior depends on the model:"
            - list [ref=e518]:
              - listitem [ref=e519]:
                - text: •
                - strong [ref=e520]: Claude Mythos Preview
                - text: uses
                - link "adaptive thinking" [ref=e521] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/adaptive-thinking
                - text: by default (no
                - code [ref=e522]: thinking
                - text: configuration required).
                - code [ref=e523]: "thinking: {type: \"disabled\"}"
                - text: is rejected. Effort controls thinking depth the same way as on Opus 4.6.
              - listitem [ref=e524]:
                - text: •
                - strong [ref=e525]: Claude Opus 4.6
                - text: uses
                - link "adaptive thinking" [ref=e526] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/adaptive-thinking
                - text: (
                - code [ref=e527]: "thinking: {type: \"adaptive\"}"
                - text: ), where effort is the recommended control for thinking depth. While
                - code [ref=e528]: budget_tokens
                - text: is still accepted on Opus 4.6, it is deprecated and will be removed in a future release. At
                - code [ref=e529]: high
                - text: and
                - code [ref=e530]: max
                - text: effort, Claude almost always thinks deeply. At lower levels, it may skip thinking for simpler problems.
              - listitem [ref=e531]:
                - text: •
                - strong [ref=e532]: Claude Sonnet 4.6
                - text: uses
                - link "adaptive thinking" [ref=e533] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/adaptive-thinking
                - text: (where effort controls thinking depth). Manual thinking with
                - link "interleaved mode" [ref=e534] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/extended-thinking#interleaved-thinking
                - text: (
                - code [ref=e535]: "thinking: {type: \"enabled\", budget_tokens: N}"
                - text: ) is still functional but deprecated.
              - listitem [ref=e536]:
                - text: •
                - strong [ref=e537]: Claude Opus 4.5 and other Claude 4 models
                - text: use manual thinking (
                - code [ref=e538]: "thinking: {type: \"enabled\", budget_tokens: N}"
                - text: ), where effort works alongside the thinking token budget. Set the effort level for your task, then set the thinking token budget based on task complexity.
            - paragraph [ref=e539]: The effort parameter can be used with or without extended thinking enabled. When used without thinking, it still controls overall token spend for text responses and tool calls.
            - heading "Copy link to clipboard Best practices" [level=2] [ref=e540]:
              - generic [ref=e541]:
                - button "Copy link to clipboard" [ref=e543] [cursor=pointer]:
