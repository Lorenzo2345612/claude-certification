                - text: . When your organization has a ZDR arrangement, data sent through this feature is not stored after the API response is returned.
            - paragraph [ref=e310]: The effort parameter allows you to control how eager Claude is about spending tokens when responding to requests. This gives you the ability to trade off between response thoroughness and token efficiency, all with a single model. The effort parameter is generally available on all supported models with no beta header required.
