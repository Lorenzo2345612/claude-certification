            - list [ref=e548]:
              - listitem [ref=e549]:
                - strong [ref=e550]: "Set effort explicitly:"
                - text: The API defaults to
                - code [ref=e551]: high
                - text: ", but the right starting point depends on your model and workload."
              - listitem [ref=e552]:
                - strong [ref=e553]: "Use low for speed-sensitive or simple tasks:"
                - text: When latency matters or tasks are straightforward, low effort can significantly reduce response times and costs.
              - listitem [ref=e554]:
                - strong [ref=e555]: "Test your use case:"
                - text: The impact of effort levels varies by task type. Evaluate performance on your specific use cases before deploying.
              - listitem [ref=e556]:
                - strong [ref=e557]: "Consider dynamic effort:"
                - text: Adjust effort based on task complexity. Simple queries may warrant low effort while agentic coding and complex reasoning benefit from high effort.
