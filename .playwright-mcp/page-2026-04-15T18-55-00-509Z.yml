            - heading "Copy link to clipboard Using prompt caching with Message Batches" [level=3] [ref=e930]:
              - generic [ref=e931]:
                - button "Copy link to clipboard" [ref=e933] [cursor=pointer]:
                  - img [ref=e935]
                - generic [ref=e937]: Using prompt caching with Message Batches
            - paragraph [ref=e938]: The Message Batches API supports prompt caching, allowing you to potentially reduce costs and processing time for batch requests. The pricing discounts from prompt caching and Message Batches can stack, providing even greater cost savings when both features are used together. However, since batch requests are processed asynchronously and concurrently, cache hits are provided on a best-effort basis. Users typically experience cache hit rates ranging from 30% to 98%, depending on their traffic patterns.
            - paragraph [ref=e939]: "To maximize the likelihood of cache hits in your batch requests:"
            - list [ref=e940]:
              - listitem [ref=e941]:
                - text: Include identical
                - code [ref=e942]: cache_control
                - text: blocks in every Message request within your batch
              - listitem [ref=e943]: Maintain a steady stream of requests to prevent cache entries from expiring after their 5-minute lifetime
              - listitem [ref=e944]: Structure your requests to share as much cached content as possible
