            - paragraph [ref=e1032]:
              - text: The
              - code [ref=e1033]: output-300k-2026-03-24
              - text: beta header raises the
              - code [ref=e1034]: max_tokens
              - text: cap to 300,000 for batch requests using Claude Opus 4.6 or Claude Sonnet 4.6. Include the header to generate outputs far longer than the standard limit (64k to 128k depending on model) in a single turn.
            - generic [ref=e1035]:
              - img [ref=e1038]
              - paragraph [ref=e1041]: Extended output is available on the Message Batches API only, not the synchronous Messages API. It is supported on the Claude API and is not available on Amazon Bedrock, Vertex AI, or Microsoft Foundry.
            - paragraph [ref=e1042]: Use extended output for long-form generation such as book-length drafts and technical documentation, exhaustive structured data extraction, large code-generation scaffolds, and long reasoning chains.
            - paragraph [ref=e1043]: A single 300k-token generation can take over an hour to complete, so plan your batch submissions with the 24-hour processing window in mind. Standard batch pricing (50% of standard API prices) applies.
