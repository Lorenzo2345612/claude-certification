            - paragraph [ref=e1097]: "To get the most out of the Batches API:"
            - list [ref=e1098]:
              - listitem [ref=e1099]: • Monitor batch processing status regularly and implement appropriate retry logic for failed requests.
              - listitem [ref=e1100]:
                - text: • Use meaningful
                - code [ref=e1101]: custom_id
                - text: values to easily match results with requests, since order is not guaranteed.
              - listitem [ref=e1102]: • Consider breaking very large datasets into multiple batches for better manageability.
              - listitem [ref=e1103]: • Dry run a single request shape with the Messages API to avoid validation errors.
            - heading "Copy link to clipboard Troubleshooting common issues" [level=3] [ref=e1104]:
              - generic [ref=e1105]:
                - button "Copy link to clipboard" [ref=e1107] [cursor=pointer]:
                  - img [ref=e1109]
                - generic [ref=e1111]: Troubleshooting common issues
            - paragraph [ref=e1112]: "If experiencing unexpected behavior:"
            - list [ref=e1113]:
              - listitem [ref=e1114]:
                - text: • Verify that the total batch request size doesn't exceed 256 MB. If the request size is too large, you may get a 413
                - code [ref=e1115]: request_too_large
                - text: error.
              - listitem [ref=e1116]:
                - text: • Check that you're using
                - link "supported models" [ref=e1117] [cursor=pointer]:
                  - /url: "#supported-models"
                - text: for all requests in the batch.
              - listitem [ref=e1118]:
                - text: • Ensure each request in the batch has a unique
                - code [ref=e1119]: custom_id
                - text: .
              - listitem [ref=e1120]:
                - text: • Ensure that it has been less than 29 days since batch
                - code [ref=e1121]: created_at
                - text: (not processing
                - code [ref=e1122]: ended_at
                - text: ) time. If over 29 days have passed, results will no longer be viewable.
              - listitem [ref=e1123]: • Confirm that the batch has not been canceled.
            - paragraph [ref=e1124]: Note that the failure of one request in a batch does not affect the processing of other requests.
            - separator [ref=e1125]
            - heading "Copy link to clipboard Batch storage and privacy" [level=2] [ref=e1126]:
              - generic [ref=e1127]:
                - button "Copy link to clipboard" [ref=e1129] [cursor=pointer]:
                  - img [ref=e1131]
                - generic [ref=e1133]: Batch storage and privacy
            - list [ref=e1134]:
              - listitem [ref=e1135]:
                - text: •
                - paragraph [ref=e1136]:
                  - strong [ref=e1137]: Workspace isolation
                  - text: ": Batches are isolated within the Workspace they are created in. They can only be accessed by API keys associated with that Workspace, or users with permission to view Workspace batches in the Console."
              - listitem [ref=e1138]:
                - text: •
                - paragraph [ref=e1139]:
                  - strong [ref=e1140]: Result availability
                  - text: ": Batch results are available for 29 days after the batch is created, allowing ample time for retrieval and processing."
            - separator [ref=e1141]
            - heading "Copy link to clipboard Data retention" [level=2] [ref=e1142]:
              - generic [ref=e1143]:
                - button "Copy link to clipboard" [ref=e1145] [cursor=pointer]:
                  - img [ref=e1147]
                - generic [ref=e1149]: Data retention
            - paragraph [ref=e1150]:
              - text: Batch processing stores request and response data for up to 29 days after batch creation. You can delete a message batch at any time after processing using the
              - code [ref=e1151]: "DELETE /v1/messages/batches/{batch_id}"
              - text: endpoint. To delete an in-progress batch, cancel it first. Asynchronous processing requires server-side storage of both inputs and outputs until batch completion and result retrieval.
