            - paragraph [ref=e301]: "Batch processing is a powerful approach for handling large volumes of requests efficiently. Instead of processing requests one at a time with immediate responses, batch processing allows you to submit multiple requests together for asynchronous processing. This pattern is particularly useful when:"
            - list [ref=e302]:
              - listitem [ref=e303]: • You need to process large volumes of data
              - listitem [ref=e304]: • Immediate responses are not required
              - listitem [ref=e305]: • You want to optimize for cost efficiency
              - listitem [ref=e306]: • You're running large-scale evaluations or analyses
            - paragraph [ref=e307]: The Message Batches API is Anthropic's first implementation of this pattern.
            - generic [ref=e308]:
              - img [ref=e311]
              - paragraph [ref=e314]:
                - text: This feature is
                - strong [ref=e315]: not
                - text: eligible for
                - link "Zero Data Retention (ZDR)" [ref=e316] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/api-and-data-retention
                - text: . Data is retained according to the feature's standard retention policy.
            - separator [ref=e317]
            - heading "Copy link to clipboard Message Batches API" [level=1] [ref=e318]:
              - generic [ref=e319]:
                - button "Copy link to clipboard" [ref=e321] [cursor=pointer]:
                  - img [ref=e323]
                - generic [ref=e325]: Message Batches API
            - paragraph [ref=e326]:
              - text: The Message Batches API is a powerful, cost-effective way to asynchronously process large volumes of
              - link "Messages" [ref=e327] [cursor=pointer]:
                - /url: /docs/en/api/messages/create
              - text: requests. This approach is well-suited to tasks that do not require immediate responses, with most batches finishing in less than 1 hour while reducing costs by 50% and increasing throughput.
            - paragraph [ref=e328]:
              - text: You can
              - link "explore the API reference directly" [ref=e329] [cursor=pointer]:
                - /url: /docs/en/api/creating-message-batches
              - text: ", in addition to this guide."
            - heading "Copy link to clipboard How the Message Batches API works" [level=2] [ref=e330]:
              - generic [ref=e331]:
                - button "Copy link to clipboard" [ref=e333] [cursor=pointer]:
                  - img [ref=e335]
                - generic [ref=e337]: How the Message Batches API works
            - paragraph [ref=e338]: "When you send a request to the Message Batches API:"
            - list [ref=e339]:
              - listitem [ref=e340]: The system creates a new Message Batch with the provided Messages requests.
              - listitem [ref=e341]: The batch is then processed asynchronously, with each request handled independently.
              - listitem [ref=e342]: You can poll for the status of the batch and retrieve results when processing has ended for all requests.
            - paragraph [ref=e343]: "This is especially useful for bulk operations that don't require immediate results, such as:"
            - list [ref=e344]:
              - listitem [ref=e345]: "• Large-scale evaluations: Process thousands of test cases efficiently."
              - listitem [ref=e346]: "• Content moderation: Analyze large volumes of user-generated content asynchronously."
              - listitem [ref=e347]: "• Data analysis: Generate insights or summaries for large datasets."
              - listitem [ref=e348]: "• Bulk content generation: Create large amounts of text for various purposes (e.g., product descriptions, article summaries)."
            - heading "Copy link to clipboard Batch limitations" [level=3] [ref=e349]:
              - generic [ref=e350]:
                - button "Copy link to clipboard" [ref=e352] [cursor=pointer]:
                  - img [ref=e354]
                - generic [ref=e356]: Batch limitations
            - list [ref=e357]:
              - listitem [ref=e358]: • A Message Batch is limited to either 100,000 Message requests or 256 MB in size, whichever is reached first.
              - listitem [ref=e359]: • The system processes each batch as fast as possible, with most batches completing within 1 hour. You can access batch results when all messages have completed or after 24 hours, whichever comes first. Batches expire if processing does not complete within 24 hours.
              - listitem [ref=e360]: • Batch results are available for 29 days after creation. After that, you may still view the Batch, but its results will no longer be available for download.
              - listitem [ref=e361]:
                - text: • Batches are scoped to a
                - link "Workspace" [ref=e362] [cursor=pointer]:
                  - /url: /settings/workspaces
                - text: . You may view all batches (and their results) that were created within the Workspace that your API key belongs to.
              - listitem [ref=e363]:
                - text: • Rate limits apply to both Batches API HTTP requests and the number of requests within a batch waiting to be processed. See
                - link "Message Batches API rate limits" [ref=e364] [cursor=pointer]:
                  - /url: /docs/en/api/rate-limits#message-batches-api
                - text: . Additionally, processing may be slowed down based on current demand and your request volume. In that case, you may see more requests expiring after 24 hours.
              - listitem [ref=e365]:
                - text: • Due to high throughput and concurrent processing, batches may go slightly over your Workspace's configured
                - link "spend limit" [ref=e366] [cursor=pointer]:
                  - /url: /settings/limits
                - text: .
            - heading "Copy link to clipboard Supported models" [level=3] [ref=e367]:
              - generic [ref=e368]:
                - button "Copy link to clipboard" [ref=e370] [cursor=pointer]:
                  - img [ref=e372]
                - generic [ref=e374]: Supported models
            - paragraph [ref=e375]:
              - text: All
              - link "active models" [ref=e376] [cursor=pointer]:
                - /url: /docs/en/about-claude/models/overview
              - text: support the Message Batches API.
            - heading "Copy link to clipboard What can be batched" [level=3] [ref=e377]:
              - generic [ref=e378]:
                - button "Copy link to clipboard" [ref=e380] [cursor=pointer]:
                  - img [ref=e382]
                - generic [ref=e384]: What can be batched
            - paragraph [ref=e385]: "Any request that you can make to the Messages API can be included in a batch. This includes:"
            - list [ref=e386]:
              - listitem [ref=e387]: • Vision
              - listitem [ref=e388]: • Tool use
              - listitem [ref=e389]: • System messages
              - listitem [ref=e390]: • Multi-turn conversations
              - listitem [ref=e391]: • Any beta features
            - paragraph [ref=e392]: Since each request in the batch is processed independently, you can mix different types of requests within a single batch.
            - generic [ref=e393]:
              - img [ref=e396]
              - paragraph [ref=e399]:
                - text: Since batches can take longer than 5 minutes to process, consider using the
                - link "1-hour cache duration" [ref=e400] [cursor=pointer]:
                  - /url: /docs/en/build-with-claude/prompt-caching#1-hour-cache-duration
                - text: with prompt caching for better cache hit rates when processing batches with shared context.
