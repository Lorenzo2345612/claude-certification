            - generic [ref=e966]:
              - link "Auto-compaction" [ref=e967] [cursor=pointer]:
                - /url: /docs/en/how-claude-code-works#when-context-fills-up
              - text: carries invoked skills forward within a token budget. When the conversation is summarized to free context, Claude Code re-attaches the most recent invocation of each skill after the summary, keeping the first 5,000 tokens of each. Re-attached skills share a combined budget of 25,000 tokens. Claude Code fills this budget starting from the most recently invoked skill, so older skills can be dropped entirely after compaction if you have invoked many in one session.
            - generic [ref=e968]:
              - text: If a skill seems to stop influencing behavior after the first response, the content is usually still present and the model is choosing other tools or approaches. Strengthen the skill’s
