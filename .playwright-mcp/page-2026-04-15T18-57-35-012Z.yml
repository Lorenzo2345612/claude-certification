                - generic [ref=e5870]: "# run-tests-async.sh"
                - generic [ref=e5871]: "# Read hook input from stdin"
                - generic [ref=e5872]: INPUT=$(cat)
                - generic [ref=e5873]: FILE_PATH=$(echo "$INPUT" | jq -r '.tool_input.file_path // empty')
                - generic [ref=e5874]: "# Only run tests for source files"
                - generic [ref=e5875]: if [[ "$FILE_PATH" != *.ts && "$FILE_PATH" != *.js ]]; then
                - generic [ref=e5876]: exit 0
                - generic [ref=e5877]: fi
                - generic [ref=e5878]: "# Run tests and report results via systemMessage"
                - generic [ref=e5879]: RESULT=$(npm test 2>&1)
                - generic [ref=e5880]: EXIT_CODE=$?
                - generic [ref=e5881]: if [ $EXIT_CODE -eq 0 ]; then
                - generic [ref=e5882]: "echo \"{\\\"systemMessage\\\": \\\"Tests passed after editing $FILE_PATH\\\"}\""
                - generic [ref=e5883]: else
                - generic [ref=e5884]: "echo \"{\\\"systemMessage\\\": \\\"Tests failed after editing $FILE_PATH: $RESULT\\\"}\""
                - generic [ref=e5885]: fi
