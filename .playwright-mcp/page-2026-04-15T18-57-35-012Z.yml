            - generic [ref=e166]:
              - text: "Hooks fire at specific points during a Claude Code session. When an event fires and a matcher matches, Claude Code passes JSON context about the event to your hook handler. For command hooks, input arrives on stdin. For HTTP hooks, it arrives as the POST request body. Your handler can then inspect the input, take action, and optionally return a decision. Events fall into three cadences: once per session ("
              - code [ref=e167]: SessionStart
              - text: ","
              - code [ref=e168]: SessionEnd
              - text: ), once per turn (
              - code [ref=e169]: UserPromptSubmit
              - text: ","
              - code [ref=e170]: Stop
              - text: ","
              - code [ref=e171]: StopFailure
              - text: ), and on every tool call inside the agentic loop (
              - code [ref=e172]: PreToolUse
              - text: ","
              - code [ref=e173]: PostToolUse
              - text: "):"
            - img "Hook lifecycle diagram showing SessionStart, then a per-turn loop containing UserPromptSubmit, the nested agentic loop (PreToolUse, PermissionRequest, PostToolUse, SubagentStart/Stop, TaskCreated, TaskCompleted), and Stop or StopFailure, followed by TeammateIdle, PreCompact, PostCompact, and SessionEnd, with Elicitation and ElicitationResult nested inside MCP tool execution, PermissionDenied as a side branch from PermissionRequest for auto-mode denials, and WorktreeCreate, WorktreeRemove, Notification, ConfigChange, InstructionsLoaded, CwdChanged, and FileChanged as standalone async events" [ref=e182]
