            - generic [ref=e5966]: "Keep these practices in mind when writing hooks:"
            - list [ref=e5967]:
              - listitem [ref=e5968]:
                - strong [ref=e5969]: Validate and sanitize inputs
                - text: ": never trust input data blindly"
              - listitem [ref=e5970]:
                - strong [ref=e5971]: Always quote shell variables
                - text: ": use"
                - code [ref=e5972]: "\"$VAR\""
                - text: not
                - code [ref=e5973]: $VAR
              - listitem [ref=e5974]:
                - strong [ref=e5975]: Block path traversal
                - text: ": check for"
                - code [ref=e5976]: ..
                - text: in file paths
              - listitem [ref=e5977]:
                - strong [ref=e5978]: Use absolute paths
                - text: ": specify full paths for scripts, using"
                - code [ref=e5979]: "\"$CLAUDE_PROJECT_DIR\""
                - text: for the project root
              - listitem [ref=e5980]:
                - strong [ref=e5981]: Skip sensitive files
                - text: ": avoid"
                - code [ref=e5982]: .env
                - text: ","
                - code [ref=e5983]: .git/
                - text: ", keys, etc."
