            - heading "Navigate to header Limitations" [level=3] [ref=e5926]:
              - link "Navigate to header" [ref=e5927] [cursor=pointer]:
                - /url: "#limitations"
                - img [ref=e5929]
              - generic [ref=e5931] [cursor=pointer]: Limitations
            - generic [ref=e5932]: "Async hooks have several constraints compared to synchronous hooks:"
            - list [ref=e5933]:
              - listitem [ref=e5934]:
                - text: Only
                - code [ref=e5935]: "type: \"command\""
                - text: hooks support
                - code [ref=e5936]: async
                - text: . Prompt-based hooks cannot run asynchronously.
              - listitem [ref=e5937]: Async hooks cannot block tool calls or return decisions. By the time the hook completes, the triggering action has already proceeded.
              - listitem [ref=e5938]:
                - text: "Hook output is delivered on the next conversation turn. If the session is idle, the response waits until the next user interaction. Exception: an"
                - code [ref=e5939]: asyncRewake
                - text: hook that exits with code 2 wakes Claude immediately even when the session is idle.
              - listitem [ref=e5940]: Each execution creates a separate background process. There is no deduplication across multiple firings of the same async hook.
            - heading "Navigate to header Security considerations" [level=2] [ref=e5941]:
              - link "Navigate to header" [ref=e5942] [cursor=pointer]:
                - /url: "#security-considerations"
                - img [ref=e5944]
              - generic [ref=e5946] [cursor=pointer]: Security considerations
            - heading "Navigate to header Disclaimer" [level=3] [ref=e5947]:
              - link "Navigate to header" [ref=e5948] [cursor=pointer]:
                - /url: "#disclaimer"
                - img [ref=e5950]
              - generic [ref=e5952] [cursor=pointer]: Disclaimer
            - generic [ref=e5953]: Command hooks run with your system user’s full permissions.
            - generic [ref=e5954]:
              - img "Warning" [ref=e5956]
              - generic [ref=e5959]: Command hooks execute shell commands with your full user permissions. They can modify, delete, or access any files your user account can access. Review and test all hook commands before adding them to your configuration.
            - heading "Navigate to header Security best practices" [level=3] [ref=e5960]:
              - link "Navigate to header" [ref=e5961] [cursor=pointer]:
                - /url: "#security-best-practices"
                - img [ref=e5963]
