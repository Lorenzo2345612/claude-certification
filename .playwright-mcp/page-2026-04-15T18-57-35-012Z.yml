                    - code [ref=e1718]: continue
                  - cell "true" [ref=e1719]:
                    - code [ref=e1720]: "true"
                  - cell "If false, Claude stops processing entirely after the hook runs. Takes precedence over any event-specific decision fields" [ref=e1721]:
                    - text: If
                    - code [ref=e1722]: "false"
                    - text: ", Claude stops processing entirely after the hook runs. Takes precedence over any event-specific decision fields"
                - row "stopReason none Message shown to the user when continue is false. Not shown to Claude" [ref=e1723]:
                  - cell "stopReason" [ref=e1724]:
                    - code [ref=e1725]: stopReason
                  - cell "none" [ref=e1726]
