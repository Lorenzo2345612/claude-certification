            - generic [ref=e2914]:
              - text: There is no timeout or retry limit. The session remains on disk until you resume it. If the answer is not ready when you resume, the hook can return
              - code [ref=e2915]: "\"defer\""
              - text: again and the process exits the same way. The calling process controls when to break the loop by eventually returning
              - code [ref=e2916]: "\"allow\""
              - text: or
              - code [ref=e2917]: "\"deny\""
              - text: from the hook.
            - generic [ref=e2918]:
              - code [ref=e2919]: "\"defer\""
              - text: only works when Claude makes a single tool call in the turn. If Claude makes several tool calls at once,
              - code [ref=e2920]: "\"defer\""
              - text: "is ignored with a warning and the tool proceeds through the normal permission flow. The constraint exists because resume can only re-run one tool: there is no way to defer one call from a batch without leaving the others unresolved."
            - generic [ref=e2921]:
              - text: If the deferred tool is no longer available when you resume, the process exits with
              - code [ref=e2922]: "stop_reason: \"tool_deferred_unavailable\""
              - text: and
              - code [ref=e2923]: "is_error: true"
              - text: before the hook fires. This happens when an MCP server that provided the tool is not connected for the resumed session. The
              - code [ref=e2924]: deferred_tool_use
              - text: payload is still included so you can identify which tool went missing.
