            - generic [ref=e5771]:
              - text: By default, hooks block Claude’s execution until they complete. For long-running tasks like deployments, test suites, or external API calls, set
              - code [ref=e5772]: "\"async\": true"
              - text: "to run the hook in the background while Claude continues working. Async hooks cannot block or control Claude’s behavior: response fields like"
              - code [ref=e5773]: decision
              - text: ","
              - code [ref=e5774]: permissionDecision
              - text: ", and"
              - code [ref=e5775]: continue
              - text: have no effect, because the action they would have controlled has already completed.
            - heading "Navigate to header Configure an async hook" [level=3] [ref=e5776]:
