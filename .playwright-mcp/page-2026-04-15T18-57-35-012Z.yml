            - generic [ref=e2848]:
              - code [ref=e2849]: "\"defer\""
              - text: is for integrations that run
              - code [ref=e2850]: claude -p
              - text: as a subprocess and read its JSON output, such as an Agent SDK app or a custom UI built on top of Claude Code. It lets that calling process pause Claude at a tool call, collect input through its own interface, and resume where it left off. Claude Code honors this value only in
              - link "non-interactive mode" [ref=e2851] [cursor=pointer]:
                - /url: /docs/en/headless
              - text: with the
              - code [ref=e2852]: "-p"
              - text: flag. In interactive sessions it logs a warning and ignores the hook result.
            - generic [ref=e2853]:
              - img "Note" [ref=e2855]
              - generic [ref=e2858]:
                - text: The
                - code [ref=e2859]: defer
                - text: value requires Claude Code v2.1.89 or later. Earlier versions do not recognize it and the tool proceeds through the normal permission flow.
            - generic [ref=e2860]:
              - text: The
              - code [ref=e2861]: AskUserQuestion
              - text: "tool is the typical case: Claude wants to ask the user something, but there is no terminal to answer in. The round trip works like this:"
            - list [ref=e2862]:
              - listitem [ref=e2863]:
                - text: Claude calls
                - code [ref=e2864]: AskUserQuestion
                - text: . The
                - code [ref=e2865]: PreToolUse
                - text: hook fires.
              - listitem [ref=e2866]:
                - text: The hook returns
                - code [ref=e2867]: "permissionDecision: \"defer\""
                - text: . The tool does not execute. The process exits with
                - code [ref=e2868]: "stop_reason: \"tool_deferred\""
                - text: and the pending tool call preserved in the transcript.
              - listitem [ref=e2869]:
                - text: The calling process reads
