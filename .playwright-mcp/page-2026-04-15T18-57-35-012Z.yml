              - generic [ref=e5832] [cursor=pointer]: How async hooks execute
            - generic [ref=e5833]: When an async hook fires, Claude Code starts the hook process and immediately continues without waiting for it to finish. The hook receives the same JSON input via stdin as a synchronous hook.
            - generic [ref=e5834]:
              - text: After the background process exits, if the hook produced a JSON response with a
              - code [ref=e5835]: systemMessage
              - text: or
              - code [ref=e5836]: additionalContext
              - text: field, that content is delivered to Claude as context on the next conversation turn.
            - generic [ref=e5837]:
              - text: Async hook completion notifications are suppressed by default. To see them, enable verbose mode with
              - code [ref=e5838]: Ctrl+O
              - text: or start Claude Code with
              - code [ref=e5839]: "--verbose"
              - text: .
