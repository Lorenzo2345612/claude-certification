                - img [ref=e1658]
              - generic [ref=e1660] [cursor=pointer]: HTTP response handling
            - generic [ref=e1661]: "HTTP hooks use HTTP status codes and response bodies instead of exit codes and stdout:"
            - list [ref=e1662]:
              - listitem [ref=e1663]:
                - strong [ref=e1664]: 2xx with an empty body
                - text: ": success, equivalent to exit code 0 with no output"
              - listitem [ref=e1665]:
                - strong [ref=e1666]: 2xx with a plain text body
                - text: ": success, the text is added as context"
              - listitem [ref=e1667]:
                - strong [ref=e1668]: 2xx with a JSON body
                - text: ": success, parsed using the same"
                - link "JSON output" [ref=e1669] [cursor=pointer]:
                  - /url: "#json-output"
                - text: schema as command hooks
              - listitem [ref=e1670]:
                - strong [ref=e1671]: Non-2xx status
                - text: ": non-blocking error, execution continues"
              - listitem [ref=e1672]:
                - strong [ref=e1673]: Connection failure or timeout
                - text: ": non-blocking error, execution continues"
            - generic [ref=e1674]: Unlike command hooks, HTTP hooks cannot signal a blocking error through status codes alone. To block a tool call or deny a permission, return a 2xx response with a JSON body containing the appropriate decision fields.
            - heading "Navigate to header JSON output" [level=3] [ref=e1675]:
              - link "Navigate to header" [ref=e1676] [cursor=pointer]:
                - /url: "#json-output"
                - img [ref=e1678]
              - generic [ref=e1680] [cursor=pointer]: JSON output
            - generic [ref=e1681]:
              - text: Exit codes let you allow or block, but JSON output gives you finer-grained control. Instead of exiting with code 2 to block, exit 0 and print a JSON object to stdout. Claude Code reads specific fields from that JSON to control behavior, including
              - link "decision control" [ref=e1682] [cursor=pointer]:
                - /url: "#decision-control"
              - text: for blocking, allowing, or escalating to the user.
            - generic [ref=e1683]:
              - img "Note" [ref=e1685]
              - generic [ref=e1688]: "You must choose one approach per hook, not both: either use exit codes alone for signaling, or exit 0 and print JSON for structured control. Claude Code only processes JSON on exit 0. If you exit 2, any JSON is ignored."
            - generic [ref=e1689]:
              - text: Your hook’s stdout must contain only the JSON object. If your shell profile prints text on startup, it can interfere with JSON parsing. See
              - link "JSON validation failed" [ref=e1690] [cursor=pointer]:
                - /url: /docs/en/hooks-guide#json-validation-failed
              - text: in the troubleshooting guide.
            - generic [ref=e1691]:
              - text: Hook output injected into context (
              - code [ref=e1692]: additionalContext
              - text: ","
              - code [ref=e1693]: systemMessage
              - text: ", or plain stdout) is capped at 10,000 characters. Output that exceeds this limit is saved to a file and replaced with a preview and file path, the same way large tool results are handled."
            - generic [ref=e1694]: "The JSON object supports three kinds of fields:"
            - list [ref=e1695]:
              - listitem [ref=e1696]:
                - strong [ref=e1697]: Universal fields
                - text: like
                - code [ref=e1698]: continue
                - text: work across all events. These are listed in the table below.
              - listitem [ref=e1699]:
                - strong [ref=e1700]:
                  - text: Top-level
                  - code [ref=e1701]: decision
                  - text: and
                  - code [ref=e1702]: reason
                - text: are used by some events to block or provide feedback.
              - listitem [ref=e1703]:
                - strong [ref=e1704]:
                  - code [ref=e1705]: hookSpecificOutput
                - text: is a nested object for events that need richer control. It requires a
                - code [ref=e1706]: hookEventName
                - text: field set to the event name.
            - table [ref=e1709]:
              - rowgroup [ref=e1710]:
                - row "Field Default Description" [ref=e1711]:
                  - columnheader "Field" [ref=e1712]
                  - columnheader "Default" [ref=e1713]
                  - columnheader "Description" [ref=e1714]
