            - generic [ref=e5846]:
              - text: This hook starts a test suite in the background whenever Claude writes a file, then reports the results back to Claude when the tests finish. Save this script to
              - code [ref=e5847]: .claude/hooks/run-tests-async.sh
              - text: in your project and make it executable with
              - code [ref=e5848]: chmod +x
              - text: ":"
