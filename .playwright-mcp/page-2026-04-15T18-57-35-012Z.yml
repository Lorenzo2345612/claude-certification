                - generic [ref=e1492]: "# Reads JSON input from stdin, checks the command"
                - generic [ref=e1493]: command=$(jq -r '.tool_input.command' < /dev/stdin)
                - generic [ref=e1494]: if [[ "$command" == rm* ]]; then
                - generic [ref=e1495]: "echo \"Blocked: rm commands are not allowed\" >&2"
                - generic [ref=e1496]: "exit 2 # Blocking error: tool call is prevented"
                - generic [ref=e1497]: fi
                - generic [ref=e1498]: "exit 0 # Success: tool call proceeds"
            - generic [ref=e1499]:
              - img "Warning" [ref=e1501]
              - generic [ref=e1504]:
                - text: For most hook events, only exit code 2 blocks the action. Claude Code treats exit code 1 as a non-blocking error and proceeds with the action, even though 1 is the conventional Unix failure code. If your hook is meant to enforce a policy, use
