            - generic [ref=e5782]:
              - text: Add
              - code [ref=e5783]: "\"async\": true"
              - text: to a command hook’s configuration to run it in the background without blocking Claude. This field is only available on
              - code [ref=e5784]: "type: \"command\""
              - text: hooks.
            - generic [ref=e5785]:
              - text: This hook runs a test script after every
              - code [ref=e5786]: Write
              - text: tool call. Claude continues working immediately while
              - code [ref=e5787]: run-tests.sh
