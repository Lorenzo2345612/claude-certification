                - text: .
            - paragraph [ref=e393]:
              - text: "In practice this reads as: while"
              - code [ref=e394]: stop_reason == "tool_use"
              - text: ", execute the tools and continue the conversation. The loop exits on any other stop reason ("
              - code [ref=e395]: "\"end_turn\""
              - text: ","
              - code [ref=e396]: "\"max_tokens\""
              - text: ","
              - code [ref=e397]: "\"stop_sequence\""
              - text: ", or"
              - code [ref=e398]: "\"refusal\""
              - text: ), which means Claude has either produced a final answer or stopped for another reason that your application should handle.
            - paragraph [ref=e399]:
              - text: For the mechanics of building requests, handling parallel tool calls, and formatting results, see
              - link "Handle tool calls" [ref=e400] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/handle-tool-calls
              - text: .
            - heading "Copy link to clipboard The server-side loop" [level=2] [ref=e401]:
              - generic [ref=e402]:
                - button "Copy link to clipboard" [ref=e404] [cursor=pointer]:
                  - img [ref=e406]
                - generic [ref=e408]: The server-side loop
            - paragraph [ref=e409]: Server-executed tools run their own loop inside Anthropic's infrastructure. A single request from your application might trigger several web searches or code executions before a response comes back. The model searches, reads results, decides to search again, and iterates until it has what it needs, all without your application participating.
            - paragraph [ref=e410]:
              - text: This internal loop has an iteration limit. If the model is still iterating when it hits the cap, the response comes back with
              - code [ref=e411]: "stop_reason: \"pause_turn\""
              - text: instead of
              - code [ref=e412]: "\"end_turn\""
              - text: . A paused turn means the work isn't finished; re-send the conversation (including the paused response) to let the model continue where it left off. See
              - link "Server tools" [ref=e413] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/server-tools
              - text: for the continuation pattern.
            - heading "Copy link to clipboard When to use tools (and when not to)" [level=2] [ref=e414]:
              - generic [ref=e415]:
                - button "Copy link to clipboard" [ref=e417] [cursor=pointer]:
                  - img [ref=e419]
                - generic [ref=e421]: When to use tools (and when not to)
            - paragraph [ref=e422]: "Tool use fits when the task requires something the model can't do from text alone:"
            - list [ref=e423]:
              - listitem [ref=e424]:
                - text: •
                - strong [ref=e425]: Actions with side effects.
                - text: Sending an email, writing a file, updating a record. The model can describe these actions, but only a tool can perform them.
              - listitem [ref=e426]:
                - text: •
                - strong [ref=e427]: Fresh or external data.
                - text: Current prices, today's weather, the contents of a database. Anything outside the training data or specific to your system needs a tool to fetch it.
              - listitem [ref=e428]:
                - text: •
                - strong [ref=e429]: Structured, guaranteed-shape outputs.
                - text: When you need a JSON object with specific fields rather than prose that happens to contain the information, a tool schema enforces the shape.
              - listitem [ref=e430]:
                - text: •
                - strong [ref=e431]: Calling into existing systems.
                - text: Databases, internal APIs, file systems. Tool use is the bridge between natural-language requests and the systems that fulfill them.
            - paragraph [ref=e432]: "The tell that you should be using tools: if you're writing a regex to extract a decision from model output, that decision should have been a tool call. Parsing free-form text to recover structured intent is a sign the structure belongs in the schema."
            - paragraph [ref=e433]: "Tool use doesn't fit when:"
            - list [ref=e434]:
              - listitem [ref=e435]: • The model can answer from training alone. Summarization, translation, and general-knowledge questions don't need a tool round trip.
              - listitem [ref=e436]: • The interaction is one-shot Q&A with no side effects. If there's nothing to execute, there's nothing for a tool to do.
              - listitem [ref=e437]: • Tool-calling latency would dominate a trivial response. Every tool call is at least one extra round trip; for lightweight tasks the overhead can exceed the work.
