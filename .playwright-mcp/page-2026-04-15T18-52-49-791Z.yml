            - paragraph [ref=e302]:
              - text: "This page explains the concepts behind tool use: where tools run, how the agentic loop works, and when tool use is the right approach. For hands-on guidance, start with the"
              - link "tutorial" [ref=e303] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/build-a-tool-using-agent
              - text: or the
              - link "implementation guide" [ref=e304] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/define-tools
              - text: .
            - heading "Copy link to clipboard The tool-use contract" [level=2] [ref=e305]:
              - generic [ref=e306]:
                - button "Copy link to clipboard" [ref=e308] [cursor=pointer]:
                  - img [ref=e310]
                - generic [ref=e312]: The tool-use contract
            - paragraph [ref=e313]: Tool use is a contract between your application and the model. You specify what operations are available and what shape their inputs and outputs take; Claude decides when and how to call them. The model never executes anything on its own. It emits a structured request, your code (or Anthropic's servers) runs the operation, and the result flows back into the conversation.
            - paragraph [ref=e314]: "This contract makes the model behave less like a text generator and more like a function you call. Engineers with classical API experience can integrate tool use the same way they would any other typed interface: define the schema, handle the callback, return a result. The difference is that the caller on the other side is a language model choosing which function to invoke based on the conversation."
            - heading "Copy link to clipboard Where tools run" [level=2] [ref=e315]:
              - generic [ref=e316]:
                - button "Copy link to clipboard" [ref=e318] [cursor=pointer]:
                  - img [ref=e320]
                - generic [ref=e322]: Where tools run
            - paragraph [ref=e323]: The primary axis along which tools differ is where the code executes. Every tool falls into one of three buckets, and the bucket determines what your application is responsible for.
            - heading "Copy link to clipboard User-defined tools (client-executed)" [level=3] [ref=e324]:
              - generic [ref=e325]:
                - button "Copy link to clipboard" [ref=e327] [cursor=pointer]:
                  - img [ref=e329]
                - generic [ref=e331]: User-defined tools (client-executed)
            - paragraph [ref=e332]: "You write the schema, you execute the code, you return the results. This is the main event: the vast majority of tool-use traffic is user-defined tools calling into application-specific logic."
            - paragraph [ref=e333]:
              - text: When Claude decides to use one of your tools, the API response contains a
              - code [ref=e334]: tool_use
              - text: block with the tool name and a JSON object of arguments. Your application extracts those arguments, runs the operation (a database query, an HTTP call, a file write, whatever the tool does), and sends the output back in a
              - code [ref=e335]: tool_result
              - text: block on the next request. Claude never sees your implementation; it only sees the schema you provided and the result you returned.
            - heading "Copy link to clipboard Anthropic-schema tools (client-executed)" [level=3] [ref=e336]:
              - generic [ref=e337]:
                - button "Copy link to clipboard" [ref=e339] [cursor=pointer]:
                  - img [ref=e341]
                - generic [ref=e343]: Anthropic-schema tools (client-executed)
            - paragraph [ref=e344]:
              - text: For a handful of common operations (running shell commands, editing files, controlling a browser, managing scratchpad memory), Anthropic publishes the tool schema and your application handles execution. The tools in this category are
              - code [ref=e345]: bash
              - text: ","
              - code [ref=e346]: text_editor
              - text: ","
              - code [ref=e347]: computer
              - text: ", and"
              - code [ref=e348]: memory
              - text: .
            - paragraph [ref=e349]:
              - text: "The execution model is identical to user-defined tools: the response contains a"
              - code [ref=e350]: tool_use
              - text: block, your code runs the operation, and you send back a
              - code [ref=e351]: tool_result
              - text: . The reason to use an Anthropic-schema tool instead of defining your own equivalent is that these schemas are trained-in. Claude has been optimized on thousands of successful trajectories that use these exact tool signatures, so it calls them more reliably and recovers from errors more gracefully than it would with a custom tool that does the same thing. The schema is the interface the model already expects.
            - heading "Copy link to clipboard Server-executed tools" [level=3] [ref=e352]:
              - generic [ref=e353]:
                - button "Copy link to clipboard" [ref=e355] [cursor=pointer]:
                  - img [ref=e357]
                - generic [ref=e359]: Server-executed tools
            - paragraph [ref=e360]:
              - text: For
              - code [ref=e361]: web_search
              - text: ","
              - code [ref=e362]: web_fetch
              - text: ","
              - code [ref=e363]: code_execution
              - text: ", and"
              - code [ref=e364]: tool_search
              - text: ", Anthropic runs the code. You enable the tool in your request and the server handles everything else. You never construct a"
              - code [ref=e365]: tool_result
              - text: block for these tools because the server-side loop executes the operation and feeds the output back to the model before the response reaches you.
            - paragraph [ref=e366]:
              - text: The response you receive contains
              - code [ref=e367]: server_tool_use
              - text: blocks showing what ran and what came back, but by the time you see them, execution is already complete. Your application's job is to enable the tool and read the final answer, not to participate in the execution loop.
            - heading "Copy link to clipboard The agentic loop (client tools)" [level=2] [ref=e368]:
              - generic [ref=e369]:
                - button "Copy link to clipboard" [ref=e371] [cursor=pointer]:
                  - img [ref=e373]
                - generic [ref=e375]: The agentic loop (client tools)
            - paragraph [ref=e376]: "Client-executed tools (both user-defined and Anthropic-schema) require your application to drive a loop. The model can't run your code, so every tool call is a round trip: the model asks, you execute, you report back, the model continues."
            - paragraph [ref=e377]:
              - text: The canonical shape is a
              - code [ref=e378]: while
              - text: loop keyed on
              - code [ref=e379]: stop_reason
              - text: ":"
            - list [ref=e380]:
              - listitem [ref=e381]:
                - text: Send a request with your
                - code [ref=e382]: tools
                - text: array and the user message.
              - listitem [ref=e383]:
                - text: Claude responds with
                - code [ref=e384]: "stop_reason: \"tool_use\""
                - text: and one or more
                - code [ref=e385]: tool_use
                - text: blocks.
              - listitem [ref=e386]:
                - text: Execute each tool. Format the outputs as
                - code [ref=e387]: tool_result
                - text: blocks.
              - listitem [ref=e388]:
                - text: Send a new request containing the original messages, the assistant's response, and a user message with the
                - code [ref=e389]: tool_result
                - text: blocks.
              - listitem [ref=e390]:
                - text: Repeat from step 2 while
