                      - generic [ref=e770]: "{"
                      - generic [ref=e771]: "\"jsonrpc\": \"2.0\","
                      - generic [ref=e772]: "\"method\": \"notifications/tools/list_changed\""
                      - generic [ref=e773]: "}"
                  - heading "Navigate to header Key Features of MCP Notifications" [level=4] [ref=e774]:
                    - link "Navigate to header" [ref=e775] [cursor=pointer]:
                      - /url: "#key-features-of-mcp-notifications"
                      - img [ref=e777]
