                  - list [ref=e780]:
                    - listitem [ref=e781]:
                      - generic [ref=e782]:
                        - strong [ref=e783]: No Response Required
                        - text: ": Notice there’s no"
                        - code [ref=e784]: id
                        - text: field in the notification. This follows JSON-RPC 2.0 notification semantics where no response is expected or sent.
                    - listitem [ref=e785]:
                      - generic [ref=e786]:
                        - strong [ref=e787]: Capability-Based
                        - text: ": This notification is only sent by servers that declared"
                        - code [ref=e788]: "\"listChanged\": true"
                        - text: in their tools capability during initialization (as shown in Step 1).
                    - listitem [ref=e789]:
                      - generic [ref=e790]:
                        - strong [ref=e791]: Event-Driven
                        - text: ": The server decides when to send notifications based on internal state changes, making MCP connections dynamic and responsive."
                  - heading "Navigate to header Client Response to Notifications" [level=4] [ref=e792]:
                    - link "Navigate to header" [ref=e793] [cursor=pointer]:
                      - /url: "#client-response-to-notifications"
                      - img [ref=e795]
                    - generic [ref=e797] [cursor=pointer]: Client Response to Notifications
                  - generic [ref=e798]: "Upon receiving this notification, the client typically reacts by requesting the updated tool list. This creates a refresh cycle that keeps the client’s understanding of available tools current:"
                  - generic [ref=e799]:
                    - generic [ref=e800]:
                      - generic "Request" [ref=e802]
                      - button "Copy the contents from the code block" [ref=e805] [cursor=pointer]:
