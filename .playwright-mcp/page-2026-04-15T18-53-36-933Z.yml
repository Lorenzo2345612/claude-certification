        - generic [ref=e179]:
          - generic [ref=e180]:
            - text: This overview of the Model Context Protocol (MCP) discusses its
            - link "scope" [ref=e181] [cursor=pointer]:
              - /url: "#scope"
            - text: and
            - link "core concepts" [ref=e182] [cursor=pointer]:
              - /url: "#concepts-of-mcp"
            - text: ", and provides an"
            - link "example" [ref=e183] [cursor=pointer]:
              - /url: "#example"
            - text: demonstrating each core concept.
          - generic [ref=e184]:
            - text: Because MCP SDKs abstract away many concerns, most developers will likely find the
            - link "data layer protocol" [ref=e185] [cursor=pointer]:
              - /url: "#data-layer-protocol"
            - text: section to be the most useful. It discusses how MCP servers can provide context to an AI application.
          - generic [ref=e186]:
            - text: For specific implementation details, please refer to the documentation for your
            - link "language-specific SDK" [ref=e187] [cursor=pointer]:
              - /url: /docs/sdk
            - text: .
          - heading "Navigate to header Scope" [level=2] [ref=e188]:
            - link "Navigate to header" [ref=e189] [cursor=pointer]:
              - /url: "#scope"
              - img [ref=e191]
            - generic [ref=e193] [cursor=pointer]: Scope
          - generic [ref=e194]: "The Model Context Protocol includes the following projects:"
          - list [ref=e195]:
            - listitem [ref=e196]:
              - link "MCP Specification" [ref=e197] [cursor=pointer]:
                - /url: https://modelcontextprotocol.io/specification/latest
              - text: ": A specification of MCP that outlines the implementation requirements for clients and servers."
            - listitem [ref=e198]:
              - link "MCP SDKs" [ref=e199] [cursor=pointer]:
                - /url: /docs/sdk
              - text: ": SDKs for different programming languages that implement MCP."
            - listitem [ref=e200]:
              - strong [ref=e201]: MCP Development Tools
              - text: ": Tools for developing MCP servers and clients, including the"
              - link "MCP Inspector" [ref=e202] [cursor=pointer]:
                - /url: https://github.com/modelcontextprotocol/inspector
            - listitem [ref=e203]:
              - link "MCP Reference Server Implementations" [ref=e204] [cursor=pointer]:
                - /url: https://github.com/modelcontextprotocol/servers
              - text: ": Reference implementations of MCP servers."
          - generic [ref=e205]:
            - img "Note" [ref=e207]
            - generic [ref=e210]: MCP focuses solely on the protocol for context exchange—it does not dictate how AI applications use LLMs or manage the provided context.
          - heading "Navigate to header Concepts of MCP" [level=2] [ref=e211]:
            - link "Navigate to header" [ref=e212] [cursor=pointer]:
              - /url: "#concepts-of-mcp"
              - img [ref=e214]
            - generic [ref=e216] [cursor=pointer]: Concepts of MCP
          - heading "Navigate to header Participants" [level=3] [ref=e217]:
            - link "Navigate to header" [ref=e218] [cursor=pointer]:
              - /url: "#participants"
              - img [ref=e220]
            - generic [ref=e222] [cursor=pointer]: Participants
          - generic [ref=e223]:
            - text: MCP follows a client-server architecture where an MCP host — an AI application like
            - link "Claude Code" [ref=e224] [cursor=pointer]:
              - /url: https://www.anthropic.com/claude-code
            - text: or
            - link "Claude Desktop" [ref=e225] [cursor=pointer]:
              - /url: https://www.claude.ai/download
            - text: — establishes connections to one or more MCP servers. The MCP host accomplishes this by creating one MCP client for each MCP server. Each MCP client maintains a dedicated connection with its corresponding MCP server.
          - generic [ref=e226]: Local MCP servers that use the STDIO transport typically serve a single MCP client, whereas remote MCP servers that use the Streamable HTTP transport will typically serve many MCP clients.
          - generic [ref=e227]: "The key participants in the MCP architecture are:"
          - list [ref=e228]:
            - listitem [ref=e229]:
              - strong [ref=e230]: MCP Host
              - text: ": The AI application that coordinates and manages one or multiple MCP clients"
            - listitem [ref=e231]:
              - strong [ref=e232]: MCP Client
              - text: ": A component that maintains a connection to an MCP server and obtains context from an MCP server for the MCP host to use"
            - listitem [ref=e233]:
              - strong [ref=e234]: MCP Server
              - text: ": A program that provides context to MCP clients"
          - generic [ref=e235]:
            - strong [ref=e236]: For example
            - text: ": Visual Studio Code acts as an MCP host. When Visual Studio Code establishes a connection to an MCP server, such as the"
            - link "Sentry MCP server" [ref=e237] [cursor=pointer]:
              - /url: https://docs.sentry.io/product/sentry-mcp/
            - text: ", the Visual Studio Code runtime instantiates an MCP client object that maintains the connection to the Sentry MCP server. When Visual Studio Code subsequently connects to another MCP server, such as the"
            - link "local filesystem server" [ref=e238] [cursor=pointer]:
              - /url: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
            - text: ", the Visual Studio Code runtime instantiates an additional MCP client object to maintain this connection."
          - generic [ref=e239]:
            - text: Note that
            - strong [ref=e240]: MCP server
            - text: refers to the program that serves context data, regardless of where it runs. MCP servers can execute locally or remotely. For example, when Claude Desktop launches the
            - link "filesystem server" [ref=e241] [cursor=pointer]:
              - /url: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
            - text: ", the server runs locally on the same machine because it uses the STDIO transport. This is commonly referred to as a “local” MCP server. The official"
            - link "Sentry MCP server" [ref=e242] [cursor=pointer]:
              - /url: https://docs.sentry.io/product/sentry-mcp/
            - text: runs on the Sentry platform, and uses the Streamable HTTP transport. This is commonly referred to as a “remote” MCP server.
          - heading "Navigate to header Layers" [level=3] [ref=e243]:
            - link "Navigate to header" [ref=e244] [cursor=pointer]:
              - /url: "#layers"
              - img [ref=e246]
            - generic [ref=e248] [cursor=pointer]: Layers
          - generic [ref=e249]: "MCP consists of two layers:"
          - list [ref=e250]:
            - listitem [ref=e251]:
              - strong [ref=e252]: Data layer
              - text: ": Defines the JSON-RPC based protocol for client-server communication, including lifecycle management, and core primitives, such as tools, resources, prompts and notifications."
            - listitem [ref=e253]:
              - strong [ref=e254]: Transport layer
              - text: ": Defines the communication mechanisms and channels that enable data exchange between clients and servers, including transport-specific connection establishment, message framing, and authorization."
          - generic [ref=e255]: Conceptually the data layer is the inner layer, while the transport layer is the outer layer.
          - heading "Navigate to header Data layer" [level=4] [ref=e256]:
            - link "Navigate to header" [ref=e257] [cursor=pointer]:
              - /url: "#data-layer"
              - img [ref=e259]
            - generic [ref=e261] [cursor=pointer]: Data layer
          - generic [ref=e262]:
            - text: The data layer implements a
            - link "JSON-RPC 2.0" [ref=e263] [cursor=pointer]:
              - /url: https://www.jsonrpc.org/
            - text: "based exchange protocol that defines the message structure and semantics. This layer includes:"
          - list [ref=e264]:
            - listitem [ref=e265]:
              - strong [ref=e266]: Lifecycle management
              - text: ": Handles connection initialization, capability negotiation, and connection termination between clients and servers"
            - listitem [ref=e267]:
              - strong [ref=e268]: Server features
              - text: ": Enables servers to provide core functionality including tools for AI actions, resources for context data, and prompts for interaction templates from and to the client"
            - listitem [ref=e269]:
              - strong [ref=e270]: Client features
              - text: ": Enables servers to ask the client to sample from the host LLM, elicit input from the user, and log messages to the client"
            - listitem [ref=e271]:
              - strong [ref=e272]: Utility features
              - text: ": Supports additional capabilities like notifications for real-time updates and progress tracking for long-running operations"
          - heading "Navigate to header Transport layer" [level=4] [ref=e273]:
            - link "Navigate to header" [ref=e274] [cursor=pointer]:
              - /url: "#transport-layer"
              - img [ref=e276]
            - generic [ref=e278] [cursor=pointer]: Transport layer
          - generic [ref=e279]: The transport layer manages communication channels and authentication between clients and servers. It handles connection establishment, message framing, and secure communication between MCP participants.
          - generic [ref=e280]: "MCP supports two transport mechanisms:"
          - list [ref=e281]:
            - listitem [ref=e282]:
              - strong [ref=e283]: Stdio transport
              - text: ": Uses standard input/output streams for direct process communication between local processes on the same machine, providing optimal performance with no network overhead."
            - listitem [ref=e284]:
              - strong [ref=e285]: Streamable HTTP transport
              - text: ": Uses HTTP POST for client-to-server messages with optional Server-Sent Events for streaming capabilities. This transport enables remote server communication and supports standard HTTP authentication methods including bearer tokens, API keys, and custom headers. MCP recommends using OAuth to obtain authentication tokens."
          - generic [ref=e286]: The transport layer abstracts communication details from the protocol layer, enabling the same JSON-RPC 2.0 message format across all transport mechanisms.
          - heading "Navigate to header Data Layer Protocol" [level=3] [ref=e287]:
            - link "Navigate to header" [ref=e288] [cursor=pointer]:
              - /url: "#data-layer-protocol"
              - img [ref=e290]
            - generic [ref=e292] [cursor=pointer]: Data Layer Protocol
          - generic [ref=e293]:
            - text: A core part of MCP is defining the schema and semantics between MCP clients and MCP servers. Developers will likely find the data layer — in particular, the set of
            - link "primitives" [ref=e294] [cursor=pointer]:
              - /url: "#primitives"
            - text: — to be the most interesting part of MCP. It is the part of MCP that defines the ways developers can share context from MCP servers to MCP clients.
          - generic [ref=e295]:
            - text: MCP uses
            - link "JSON-RPC 2.0" [ref=e296] [cursor=pointer]:
              - /url: https://www.jsonrpc.org/
            - text: as its underlying RPC protocol. Client and servers send requests to each other and respond accordingly. Notifications can be used when no response is required.
          - heading "Navigate to header Lifecycle management" [level=4] [ref=e297]:
            - link "Navigate to header" [ref=e298] [cursor=pointer]:
              - /url: "#lifecycle-management"
              - img [ref=e300]
            - generic [ref=e302] [cursor=pointer]: Lifecycle management
          - generic [ref=e303]:
            - text: MCP is a
            - button "A subset of MCP can be made stateless using the Streamable HTTP transport" [ref=e304] [cursor=pointer]: stateful protocol
            - text: that requires lifecycle management. The purpose of lifecycle management is to negotiate the
            - button "Features and operations that a client or server supports, such as tools, resources, or prompts" [ref=e305] [cursor=pointer]: capabilities
            - text: that both client and server support. Detailed information can be found in the
            - link "specification" [ref=e306] [cursor=pointer]:
              - /url: /specification/latest/basic/lifecycle
            - text: ", and the"
            - link "example" [ref=e307] [cursor=pointer]:
              - /url: "#example"
            - text: showcases the initialization sequence.
          - heading "Navigate to header Primitives" [level=4] [ref=e308]:
            - link "Navigate to header" [ref=e309] [cursor=pointer]:
              - /url: "#primitives"
              - img [ref=e311]
            - generic [ref=e313] [cursor=pointer]: Primitives
          - generic [ref=e314]: MCP primitives are the most important concept within MCP. They define what clients and servers can offer each other. These primitives specify the types of contextual information that can be shared with AI applications and the range of actions that can be performed.
          - generic [ref=e315]:
            - text: MCP defines three core primitives that
            - emphasis [ref=e316]: servers
            - text: "can expose:"
          - list [ref=e317]:
            - listitem [ref=e318]:
              - strong [ref=e319]: Tools
              - text: ": Executable functions that AI applications can invoke to perform actions (e.g., file operations, API calls, database queries)"
            - listitem [ref=e320]:
              - strong [ref=e321]: Resources
              - text: ": Data sources that provide contextual information to AI applications (e.g., file contents, database records, API responses)"
            - listitem [ref=e322]:
              - strong [ref=e323]: Prompts
              - text: ": Reusable templates that help structure interactions with language models (e.g., system prompts, few-shot examples)"
          - generic [ref=e324]:
            - text: Each primitive type has associated methods for discovery (
            - code [ref=e325]: "*/list"
            - text: ), retrieval (
            - code [ref=e326]: "*/get"
            - text: ), and in some cases, execution (
            - code [ref=e327]: tools/call
            - text: ). MCP clients will use the
            - code [ref=e328]: "*/list"
            - text: methods to discover available primitives. For example, a client can first list all available tools (
            - code [ref=e329]: tools/list
            - text: ) and then execute them. This design allows listings to be dynamic.
          - generic [ref=e330]: As a concrete example, consider an MCP server that provides context about a database. It can expose tools for querying the database, a resource that contains the schema of the database, and a prompt that includes few-shot examples for interacting with the tools.
          - generic [ref=e331]:
            - text: For more details about server primitives see
            - link "server concepts" [ref=e332] [cursor=pointer]:
              - /url: ./server-concepts
            - text: .
          - generic [ref=e333]:
            - text: MCP also defines primitives that
            - emphasis [ref=e334]: clients
            - text: can expose. These primitives allow MCP server authors to build richer interactions.
          - list [ref=e335]:
            - listitem [ref=e336]:
              - strong [ref=e337]: Sampling
              - text: ": Allows servers to request language model completions from the client’s AI application. This is useful when server authors want access to a language model, but want to stay model-independent and not include a language model SDK in their MCP server. They can use the"
              - code [ref=e338]: sampling/complete
              - text: method to request a language model completion from the client’s AI application.
            - listitem [ref=e339]:
              - strong [ref=e340]: Elicitation
              - text: ": Allows servers to request additional information from users. This is useful when server authors want to get more information from the user, or ask for confirmation of an action. They can use the"
              - code [ref=e341]: elicitation/request
              - text: method to request additional information from the user.
            - listitem [ref=e342]:
              - strong [ref=e343]: Logging
              - text: ": Enables servers to send log messages to clients for debugging and monitoring purposes."
          - generic [ref=e344]:
            - text: For more details about client primitives see
            - link "client concepts" [ref=e345] [cursor=pointer]:
              - /url: ./client-concepts
            - text: .
          - generic [ref=e346]: "Besides server and client primitives, the protocol offers cross-cutting utility primitives that augment how requests are executed:"
          - list [ref=e347]:
            - listitem [ref=e348]:
              - strong [ref=e349]: Tasks (Experimental)
              - text: ": Durable execution wrappers that enable deferred result retrieval and status tracking for MCP requests (e.g., expensive computations, workflow automation, batch processing, multi-step operations)"
          - heading "Navigate to header Notifications" [level=4] [ref=e350]:
            - link "Navigate to header" [ref=e351] [cursor=pointer]:
              - /url: "#notifications"
              - img [ref=e353]
            - generic [ref=e355] [cursor=pointer]: Notifications
          - generic [ref=e356]: The protocol supports real-time notifications to enable dynamic updates between servers and clients. For example, when a server’s available tools change—such as when new functionality becomes available or existing tools are modified—the server can send tool update notifications to inform connected clients about these changes. Notifications are sent as JSON-RPC 2.0 notification messages (without expecting a response) and enable MCP servers to provide real-time updates to connected clients.
          - heading "Navigate to header Example" [level=2] [ref=e357]:
            - link "Navigate to header" [ref=e358] [cursor=pointer]:
              - /url: "#example"
              - img [ref=e360]
            - generic [ref=e362] [cursor=pointer]: Example
          - heading "Navigate to header Data Layer" [level=3] [ref=e363]:
            - link "Navigate to header" [ref=e364] [cursor=pointer]:
              - /url: "#data-layer-2"
              - img [ref=e366]
            - generic [ref=e368] [cursor=pointer]: Data Layer
          - generic [ref=e369]: This section provides a step-by-step walkthrough of an MCP client-server interaction, focusing on the data layer protocol. We’ll demonstrate the lifecycle sequence, tool operations, and notifications using JSON-RPC 2.0 messages.
          - list [ref=e370]:
            - listitem [ref=e371]:
              - generic [ref=e374]:
                - generic [ref=e375]: "1"
                - link "Navigate to header" [ref=e377] [cursor=pointer]:
                  - /url: "#"
                  - img [ref=e379]
              - generic [ref=e381]:
                - paragraph [ref=e382]: Initialization (Lifecycle Management)
                - generic [ref=e383]:
                  - generic [ref=e384]:
                    - text: MCP begins with lifecycle management through a capability negotiation handshake. As described in the
                    - link "lifecycle management" [ref=e385] [cursor=pointer]:
                      - /url: "#lifecycle-management"
                    - text: section, the client sends an
                    - code [ref=e386]: initialize
                    - text: request to establish the connection and negotiate supported features.
                  - generic [ref=e387]:
                    - generic [ref=e388]:
                      - tablist [ref=e389]:
                        - tab "Initialize Request" [selected] [ref=e390] [cursor=pointer]:
                          - generic [ref=e391]: Initialize Request
                        - tab "Initialize Response" [ref=e393] [cursor=pointer]:
                          - generic [ref=e394]: Initialize Response
                      - button "Copy the contents from the code block" [ref=e397] [cursor=pointer]:
                        - img [ref=e398]
                    - tabpanel "Initialize Request" [ref=e402]:
                      - code [ref=e406]:
                        - generic [ref=e407]: "{"
                        - generic [ref=e408]: "\"jsonrpc\": \"2.0\","
                        - generic [ref=e409]: "\"id\": 1,"
                        - generic [ref=e410]: "\"method\": \"initialize\","
                        - generic [ref=e411]: "\"params\": {"
                        - generic [ref=e412]: "\"protocolVersion\": \"2025-06-18\","
                        - generic [ref=e413]: "\"capabilities\": {"
                        - generic [ref=e414]: "\"elicitation\": {}"
                        - generic [ref=e415]: "},"
                        - generic [ref=e416]: "\"clientInfo\": {"
                        - generic [ref=e417]: "\"name\": \"example-client\","
                        - generic [ref=e418]: "\"version\": \"1.0.0\""
                        - generic [ref=e419]: "}"
                        - generic [ref=e420]: "}"
                        - generic [ref=e421]: "}"
                  - heading "Navigate to header Understanding the Initialization Exchange" [level=4] [ref=e422]:
                    - link "Navigate to header" [ref=e423] [cursor=pointer]:
                      - /url: "#understanding-the-initialization-exchange"
                      - img [ref=e425]
                    - generic [ref=e427] [cursor=pointer]: Understanding the Initialization Exchange
                  - generic [ref=e428]: "The initialization process is a key part of MCP’s lifecycle management and serves several critical purposes:"
                  - list [ref=e429]:
                    - listitem [ref=e430]:
                      - generic [ref=e431]:
                        - strong [ref=e432]: Protocol Version Negotiation
                        - text: ": The"
                        - code [ref=e433]: protocolVersion
                        - text: field (e.g., “2025-06-18”) ensures both client and server are using compatible protocol versions. This prevents communication errors that could occur when different versions attempt to interact. If a mutually compatible version is not negotiated, the connection should be terminated.
                    - listitem [ref=e434]:
                      - generic [ref=e435]:
                        - strong [ref=e436]: Capability Discovery
                        - text: ": The"
                        - code [ref=e437]: capabilities
                        - text: object allows each party to declare what features they support, including which
                        - link "primitives" [ref=e438] [cursor=pointer]:
                          - /url: "#primitives"
                        - text: they can handle (tools, resources, prompts) and whether they support features like
                        - link "notifications" [ref=e439] [cursor=pointer]:
                          - /url: "#notifications"
                        - text: . This enables efficient communication by avoiding unsupported operations.
