                    - generic [ref=e840] [cursor=pointer]: How This Works in AI Applications
                  - generic [ref=e841]: When the AI application receives a notification about changed tools, it immediately refreshes its tool registry and updates the LLM’s available capabilities. This ensures that ongoing conversations always have access to the most current set of tools, and the LLM can dynamically adapt to new functionality as it becomes available.
