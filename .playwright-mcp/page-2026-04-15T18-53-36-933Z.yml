                - paragraph [ref=e746]: Real-time Updates (Notifications)
                - generic [ref=e747]:
                  - generic [ref=e748]: MCP supports real-time notifications that enable servers to inform clients about changes without being explicitly requested. This demonstrates the notification system, a key feature that keeps MCP connections synchronized and responsive.
                  - heading "Navigate to header Understanding Tool List Change Notifications" [level=4] [ref=e749]:
                    - link "Navigate to header" [ref=e750] [cursor=pointer]:
                      - /url: "#understanding-tool-list-change-notifications"
                      - img [ref=e752]
                    - generic [ref=e754] [cursor=pointer]: Understanding Tool List Change Notifications
                  - generic [ref=e755]: "When the server’s available tools change—such as when new functionality becomes available, existing tools are modified, or tools become temporarily unavailable—the server can proactively notify connected clients:"
                  - generic [ref=e756]:
                    - generic [ref=e757]:
                      - generic "Request" [ref=e759]
                      - button "Copy the contents from the code block" [ref=e762] [cursor=pointer]:
                        - img [ref=e763]
