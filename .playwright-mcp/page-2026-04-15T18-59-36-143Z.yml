              - generic [ref=e2044] [cursor=pointer]: MCP output limits and warnings
            - generic [ref=e2045]: "When MCP tools produce large outputs, Claude Code helps manage the token usage to prevent overwhelming your conversation context:"
            - list [ref=e2046]:
              - listitem [ref=e2047]:
                - strong [ref=e2048]: Output warning threshold
                - text: ": Claude Code displays a warning when any MCP tool output exceeds 10,000 tokens"
              - listitem [ref=e2049]:
                - strong [ref=e2050]: Configurable limit
                - text: ": you can adjust the maximum allowed MCP output tokens using the"
                - code [ref=e2051]: MAX_MCP_OUTPUT_TOKENS
                - text: environment variable
              - listitem [ref=e2052]:
                - strong [ref=e2053]: Default limit
                - text: ": the default maximum is 25,000 tokens"
              - listitem [ref=e2054]:
                - strong [ref=e2055]: Scope
                - text: ": the environment variable applies to tools that don’t declare their own limit. Tools that set"
                - link "anthropic/maxResultSizeChars" [ref=e2056] [cursor=pointer]:
                  - /url: "#raise-the-limit-for-a-specific-tool"
                  - code [ref=e2057]: anthropic/maxResultSizeChars
                - text: use that value instead for text content, regardless of what
                - code [ref=e2058]: MAX_MCP_OUTPUT_TOKENS
                - text: is set to. Tools that return image data are still subject to
                - code [ref=e2059]: MAX_MCP_OUTPUT_TOKENS
            - generic [ref=e2060]: "To increase the limit for tools that produce large outputs:"
            - generic [ref=e2061]:
              - generic [ref=e2062]:
                - button "Report incorrect code" [ref=e2064] [cursor=pointer]:
