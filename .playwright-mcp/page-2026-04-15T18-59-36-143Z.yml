                - button "Ask AI" [ref=e2073] [cursor=pointer]:
                  - img [ref=e2074]
              - code [ref=e2080]:
                - generic [ref=e2081]: export MAX_MCP_OUTPUT_TOKENS=50000
                - generic [ref=e2082]: claude
            - generic [ref=e2083]: "This is particularly useful when working with MCP servers that:"
            - list [ref=e2084]:
              - listitem [ref=e2085]: Query large datasets or databases
              - listitem [ref=e2086]: Generate detailed reports or documentation
              - listitem [ref=e2087]: Process extensive log files or debugging information
            - heading "Navigate to header Raise the limit for a specific tool" [level=3] [ref=e2088]:
              - link "Navigate to header" [ref=e2089] [cursor=pointer]:
                - /url: "#raise-the-limit-for-a-specific-tool"
                - img [ref=e2091]
              - generic [ref=e2093] [cursor=pointer]: Raise the limit for a specific tool
            - generic [ref=e2094]:
              - text: If you’re building an MCP server, you can allow individual tools to return results larger than the default persist-to-disk threshold by setting
              - code [ref=e2095]: _meta["anthropic/maxResultSizeChars"]
              - text: in the tool’s
              - code [ref=e2096]: tools/list
              - text: response entry. Claude Code raises that tool’s threshold to the annotated value, up to a hard ceiling of 500,000 characters.
            - generic [ref=e2097]: This is useful for tools that return inherently large but necessary outputs, such as database schemas or full file trees. Without the annotation, results that exceed the default threshold are persisted to disk and replaced with a file reference in the conversation.
            - generic [ref=e2098]:
              - generic [ref=e2099]:
                - button "Report incorrect code" [ref=e2101] [cursor=pointer]:
