              - generic [ref=e2291] [cursor=pointer]: Scale with MCP Tool Search
            - generic [ref=e2292]: Tool search keeps MCP context usage low by deferring tool definitions until Claude needs them. Only tool names load at session start, so adding more MCP servers has minimal impact on your context window.
            - heading "Navigate to header How it works" [level=3] [ref=e2293]:
              - link "Navigate to header" [ref=e2294] [cursor=pointer]:
                - /url: "#how-it-works"
                - img [ref=e2296]
              - generic [ref=e2298] [cursor=pointer]: How it works
            - generic [ref=e2299]: Tool search is enabled by default. MCP tools are deferred rather than loaded into context upfront, and Claude uses a search tool to discover relevant ones when a task needs them. Only the tools Claude actually uses enter context. From your perspective, MCP tools work exactly as before.
            - generic [ref=e2300]:
              - text: If you prefer threshold-based loading, set
              - code [ref=e2301]: ENABLE_TOOL_SEARCH=auto
              - text: to load schemas upfront when they fit within 10% of the context window and defer only the overflow. See
              - link "Configure tool search" [ref=e2302] [cursor=pointer]:
                - /url: "#configure-tool-search"
              - text: for all options.
            - heading "Navigate to header For MCP server authors" [level=3] [ref=e2303]:
