            - generic [ref=e405]:
              - text: An MCP server can also push messages directly into your session so Claude can react to external events like CI results, monitoring alerts, or chat messages. To enable this, your server declares the
              - code [ref=e406]: claude/channel
              - text: capability and you opt it in with the
              - code [ref=e407]: "--channels"
