              - img "Note" [ref=e333]
              - generic [ref=e335]:
                - strong [ref=e337]: "Important: Option ordering"
                - generic [ref=e338]:
                  - text: All options (
                  - code [ref=e339]: "--transport"
                  - text: ","
                  - code [ref=e340]: "--env"
                  - text: ","
                  - code [ref=e341]: "--scope"
                  - text: ","
                  - code [ref=e342]: "--header"
                  - text: ) must come
                  - strong [ref=e343]: before
                  - text: the server name. The
                  - code [ref=e344]: "--"
                  - text: (double dash) then separates the server name from the command and arguments that get passed to the MCP server.
