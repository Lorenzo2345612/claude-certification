              - code [ref=e2117]:
                - generic [ref=e2118]: "{"
                - generic [ref=e2119]: "\"name\": \"get_schema\","
                - generic [ref=e2120]: "\"description\": \"Returns the full database schema\","
                - generic [ref=e2121]: "\"_meta\": {"
                - generic [ref=e2122]: "\"anthropic/maxResultSizeChars\": 200000"
                - generic [ref=e2123]: "}"
                - generic [ref=e2124]: "}"
            - generic [ref=e2125]:
              - text: The annotation applies independently of
              - code [ref=e2126]: MAX_MCP_OUTPUT_TOKENS
              - text: for text content, so users don’t need to raise the environment variable for tools that declare it. Tools that return image data are still subject to the token limit.
            - generic [ref=e2127]:
              - img "Warning" [ref=e2129]
              - generic [ref=e2132]:
                - text: If you frequently encounter output warnings with specific MCP servers you don’t control, consider increasing the
                - code [ref=e2133]: MAX_MCP_OUTPUT_TOKENS
                - text: limit. You can also ask the server author to add the
                - code [ref=e2134]: anthropic/maxResultSizeChars
                - text: annotation or to paginate their responses. The annotation has no effect on tools that return image content; for those, raising
                - code [ref=e2135]: MAX_MCP_OUTPUT_TOKENS
                - text: is the only option.
