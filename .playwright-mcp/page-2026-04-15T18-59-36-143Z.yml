              - generic [ref=e2141] [cursor=pointer]: Respond to MCP elicitation requests
            - generic [ref=e2142]: "MCP servers can request structured input from you mid-task using elicitation. When a server needs information it can’t get on its own, Claude Code displays an interactive dialog and passes your response back to the server. No configuration is required on your side: elicitation dialogs appear automatically when a server requests them."
