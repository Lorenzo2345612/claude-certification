              - text: If you’re building an MCP server, the server instructions field becomes more useful with Tool Search enabled. Server instructions help Claude understand when to search for your tools, similar to how
              - link "skills" [ref=e2310] [cursor=pointer]:
                - /url: /docs/en/skills
              - text: work.
            - generic [ref=e2311]: "Add clear, descriptive server instructions that explain:"
            - list [ref=e2312]:
              - listitem [ref=e2313]: What category of tasks your tools handle
              - listitem [ref=e2314]: When Claude should search for your tools
              - listitem [ref=e2315]: Key capabilities your server provides
            - generic [ref=e2316]: Claude Code truncates tool descriptions and server instructions at 2KB each. Keep them concise to avoid truncation, and put critical details near the start.
