                        - text: in older versions)
                  - listitem [ref=e429]:
                    - text: Set environment variables with
                    - code [ref=e430]: "--env"
                    - text: flags (for example,
                    - code [ref=e431]: "--env KEY=value"
                    - text: )
                  - listitem [ref=e432]:
                    - text: Configure MCP server startup timeout using the MCP_TIMEOUT environment variable (for example,
