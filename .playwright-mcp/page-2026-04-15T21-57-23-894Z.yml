            - heading "The Agentic Loop" [level=3] [ref=e95]
            - paragraph [ref=e96]: Claude's agentic loop is the core cycle that drives autonomous tool use. The model generates a response, and if the stop_reason indicates a tool call, your code executes the tool and feeds the result back for the next iteration.
            - generic [ref=e97]:
              - heading "Key Concepts" [level=4] [ref=e98]
              - list [ref=e99]:
                - listitem [ref=e100]: "The stop_reason field tells you why Claude stopped generating: end_turn (done), tool_use (wants to call a tool), max_tokens (hit limit), or pause_turn (streaming pause)"
                - listitem [ref=e101]: "Each loop iteration: send messages -> receive response -> check stop_reason -> if tool_use, execute tool -> append tool_result -> repeat"
                - listitem [ref=e102]: The loop terminates when stop_reason is end_turn, meaning Claude has finished its task without requesting more tool calls
                - listitem [ref=e103]: Tool results are sent back as tool_result content blocks matched by tool_use_id
                - listitem [ref=e104]: Max iterations should be capped to prevent runaway loops in production systems
                - listitem [ref=e105]: The agentic loop is model-agnostic infrastructure code — Claude decides when to call tools, your code executes them
            - link "Read Documentation" [ref=e106] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works#the-agentic-loop
              - generic [ref=e107]: Read Documentation
              - img [ref=e108]
          - generic [ref=e110]:
            - heading "Multi-Agent Orchestration" [level=3] [ref=e111]
            - paragraph [ref=e112]: Complex tasks often benefit from multiple specialized agents working together. The coordinator-subagent pattern uses a central agent that delegates subtasks to focused agents, each with their own tools and instructions.
            - generic [ref=e113]:
              - heading "Key Concepts" [level=4] [ref=e114]
              - list [ref=e115]:
                - listitem [ref=e116]: "Coordinator-subagent (hub-and-spoke) pattern: one agent decomposes work and delegates to specialized subagents"
                - listitem [ref=e117]: Each subagent can have its own allowedTools, system prompt, and model configuration
                - listitem [ref=e118]: Subagents are exposed to the coordinator as tools via AgentDefinition / Task tool abstraction
                - listitem [ref=e119]: The coordinator sees subagent results but not their internal reasoning or intermediate tool calls
                - listitem [ref=e120]: Subagents cannot spawn their own subagents — delegation is single-level by design
                - listitem [ref=e121]: Choose multi-agent when different subtasks need different tool sets, context, or expertise
            - link "Read Documentation" [ref=e122] [cursor=pointer]:
              - /url: https://code.claude.com/docs/en/agent-sdk/subagents
              - generic [ref=e123]: Read Documentation
              - img [ref=e124]
          - generic [ref=e126]:
            - heading "Agent SDK Hooks" [level=3] [ref=e127]
            - paragraph [ref=e128]: Hooks let you intercept and modify agent behavior at specific points in the execution lifecycle. PreToolUse and PostToolUse hooks run before and after tool execution, enabling validation, logging, and access control.
            - generic [ref=e129]:
              - heading "Key Concepts" [level=4] [ref=e130]
              - list [ref=e131]:
                - listitem [ref=e132]: PreToolUse hooks fire before a tool runs — they can allow, deny, or ask the user for permission
                - listitem [ref=e133]: PostToolUse hooks fire after a tool completes — useful for logging, output normalization, or follow-up actions
                - listitem [ref=e134]: "Hook handlers return a permissionDecision: allow, deny, or ask"
                - listitem [ref=e135]: Hooks can be defined as command (shell), http (webhook), or prompt (LLM-evaluated) handler types
                - listitem [ref=e136]: Exit code 2 from a command hook means 'ask the user' rather than allow or deny
                - listitem [ref=e137]: Hooks are configured in settings.json and provide programmatic control over agent actions
            - link "Read Documentation" [ref=e138] [cursor=pointer]:
              - /url: https://code.claude.com/docs/en/agent-sdk/hooks
              - generic [ref=e139]: Read Documentation
              - img [ref=e140]
          - generic [ref=e142]:
            - heading "Session Management" [level=3] [ref=e143]
            - paragraph [ref=e144]: Sessions track the full conversation and tool-use history of an agent interaction. They support resuming interrupted work and forking sessions to explore different paths from a shared context.
            - generic [ref=e145]:
              - heading "Key Concepts" [level=4] [ref=e146]
              - list [ref=e147]:
                - listitem [ref=e148]: Each session has a unique session ID that can be used with --resume to continue later
                - listitem [ref=e149]: fork_session creates a new session branching from an existing one, sharing prior context
                - listitem [ref=e150]: Sessions persist across interruptions like crashes or network failures
                - listitem [ref=e151]: Context is passed between parent and child in multi-agent setups via the session mechanism
                - listitem [ref=e152]: Session manifests enable recovery of the full interaction state
                - listitem [ref=e153]: Forking is useful when you want to try multiple approaches from the same starting point
            - link "Read Documentation" [ref=e154] [cursor=pointer]:
              - /url: https://code.claude.com/docs/en/agent-sdk/sessions
              - generic [ref=e155]: Read Documentation
              - img [ref=e156]
          - generic [ref=e158]:
            - heading "Task Decomposition" [level=3] [ref=e159]
            - paragraph [ref=e160]: Breaking complex tasks into smaller subtasks is fundamental to agentic systems. The approach ranges from fixed sequential pipelines (prompt chaining) to adaptive decomposition where the agent decides the next step based on intermediate results.
            - generic [ref=e161]:
              - heading "Key Concepts" [level=4] [ref=e162]
              - list [ref=e163]:
                - listitem [ref=e164]: "Prompt chaining: fixed sequence of steps where each step's output feeds the next — predictable but inflexible"
                - listitem [ref=e165]: "Adaptive decomposition: the agent dynamically decides what subtasks are needed based on intermediate results"
                - listitem [ref=e166]: Parallel subagents can execute independent subtasks simultaneously for better throughput
                - listitem [ref=e167]: The coordinator's decomposition quality directly determines the coverage and relevance of subagent outputs
                - listitem [ref=e168]: Multi-concern tasks (e.g., 'analyze X across Y dimensions') require explicit decomposition to avoid narrow coverage
                - listitem [ref=e169]: Sequential pipelines are preferred when steps have strict dependencies; parallel when subtasks are independent
            - link "Read Documentation" [ref=e170] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#chain-complex-prompts
              - generic [ref=e171]: Read Documentation
              - img [ref=e172]
          - generic [ref=e174]:
            - heading "Programmatic Enforcement vs Prompt-Based Guidance" [level=3] [ref=e175]
            - paragraph [ref=e176]: Critical business logic should be enforced programmatically rather than relying on prompt instructions alone. While prompts guide model behavior probabilistically, programmatic checks provide deterministic guarantees.
            - generic [ref=e177]:
              - heading "Key Concepts" [level=4] [ref=e178]
              - list [ref=e179]:
                - listitem [ref=e180]: "Programmatic enforcement: code-level gates that block tool execution unless prerequisites are met"
                - listitem [ref=e181]: "Prompt-based guidance: system prompt instructions that influence but cannot guarantee model behavior"
                - listitem [ref=e182]: "Use programmatic enforcement for: financial transactions, identity verification, safety-critical sequences"
                - listitem [ref=e183]: "Use prompt guidance for: tone, formatting, general approach, and non-critical preferences"
                - listitem [ref=e184]: A prerequisite gate blocks downstream tools until required prior tools have returned valid results
                - listitem [ref=e185]: Combining both approaches is common — prompts for general behavior, code for critical invariants
            - link "Read Documentation" [ref=e186] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works
              - generic [ref=e187]: Read Documentation
