                - generic [ref=e857]: Leverage thinking & interleaved thinking capabilities
            - paragraph [ref=e858]: Claude's latest models offer thinking capabilities that can be especially helpful for tasks involving reflection after tool use or complex multi-step reasoning. You can guide its initial or interleaved thinking for better results.
            - paragraph [ref=e859]:
              - text: Claude Opus 4.6 and Claude Sonnet 4.6 use
              - link "adaptive thinking" [ref=e860] [cursor=pointer]:
                - /url: /docs/en/build-with-claude/adaptive-thinking
              - text: (
              - code [ref=e861]: "thinking: {type: \"adaptive\"}"
              - text: "), where Claude dynamically decides when and how much to think. Claude calibrates its thinking based on two factors: the"
              - code [ref=e862]: effort
              - text: parameter and query complexity. Higher effort elicits more thinking, and more complex queries do the same. On easier queries that don't require thinking, the model responds directly. In internal evaluations, adaptive thinking reliably drives better performance than extended thinking. Consider moving to adaptive thinking to get the most intelligent responses.
            - paragraph [ref=e863]:
              - text: Use adaptive thinking for workloads that require agentic behavior such as multi-step tool use, complex coding tasks, and long-horizon agent loops. Older models use manual thinking mode with
              - code [ref=e864]: budget_tokens
