                    - img [ref=e1016]
                    - img [ref=e1019]
              - code [ref=e1023]: Your context window will be automatically compacted as it approaches its limit, allowing you to continue working indefinitely from where you left off. Therefore, do not stop tasks early due to token budget concerns. As you approach your token budget limit, save your current progress and state to memory before the context window refreshes. Always be as persistent and autonomous as possible and complete tasks fully, even if the end of your budget is approaching. Never artificially stop any task early regardless of the context remaining.
            - paragraph [ref=e1024]:
              - text: The
              - link "memory tool" [ref=e1025] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/tool-use/memory-tool
              - text: pairs naturally with context awareness for seamless context transitions.
            - heading "Copy link to clipboard Multi-context window workflows" [level=4] [ref=e1026]:
              - generic [ref=e1027]:
                - button "Copy link to clipboard" [ref=e1029] [cursor=pointer]:
                  - img [ref=e1031]
                - generic [ref=e1033]: Multi-context window workflows
            - paragraph [ref=e1034]: "For tasks spanning multiple context windows:"
            - list [ref=e1035]:
              - listitem [ref=e1036]:
                - paragraph [ref=e1037]:
                  - strong [ref=e1038]: Use a different prompt for the very first context window
                  - text: ": Use the first context window to set up a framework (write tests, create setup scripts), then use future context windows to iterate on a todo-list."
              - listitem [ref=e1039]:
                - paragraph [ref=e1040]:
                  - strong [ref=e1041]: Have the model write tests in a structured format
                  - text: ": Ask Claude to create tests before starting work and keep track of them in a structured format (e.g.,"
                  - code [ref=e1042]: tests.json
                  - text: "). This leads to better long-term ability to iterate. Remind Claude of the importance of tests: \"It is unacceptable to remove or edit tests because this could lead to missing or buggy functionality.\""
              - listitem [ref=e1043]:
                - paragraph [ref=e1044]:
                  - strong [ref=e1045]: Set up quality of life tools
                  - text: ": Encourage Claude to create setup scripts (e.g.,"
                  - code [ref=e1046]: init.sh
                  - text: ) to gracefully start servers, run test suites, and linters. This prevents repeated work when continuing from a fresh context window.
              - listitem [ref=e1047]:
                - paragraph [ref=e1048]:
                  - strong [ref=e1049]: Starting fresh vs compacting
                  - text: ": When a context window is cleared, consider starting with a brand new context window rather than using compaction. Claude's latest models are extremely effective at discovering state from the local filesystem. In some cases, you may want to take advantage of this over compaction. Be prescriptive about how it should start:"
                - list [ref=e1050]:
                  - listitem [ref=e1051]: • "Call pwd; you can only read and write files in this directory."
                  - listitem [ref=e1052]: • "Review progress.txt, tests.json, and the git logs."
                  - listitem [ref=e1053]: • "Manually run through a fundamental integration test before moving on to implementing new features."
              - listitem [ref=e1054]:
                - paragraph [ref=e1055]:
                  - strong [ref=e1056]: Provide verification tools
                  - text: ": As the length of autonomous tasks grows, Claude needs to verify correctness without continuous human feedback. Tools like Playwright MCP server or computer use capabilities for testing UIs are helpful."
              - listitem [ref=e1057]:
                - paragraph [ref=e1058]:
                  - strong [ref=e1059]: Encourage complete usage of context
                  - text: ": Prompt Claude to efficiently complete components before moving on:"
            - generic [ref=e1060]:
              - generic [ref=e1061]:
                - generic [ref=e1062]: Sample prompt
                - button "Copy code" [ref=e1064] [cursor=pointer]:
                  - generic [ref=e1065]:
                    - img [ref=e1067]
                    - img [ref=e1070]
              - code [ref=e1074]: This is a very long task, so it may be beneficial to plan out your work clearly. It's encouraged to spend your entire output context working on the task - just make sure you don't run out of context with significant uncommitted work. Continue working systematically until you have completed this task.
            - heading "Copy link to clipboard State management best practices" [level=4] [ref=e1075]:
              - generic [ref=e1076]:
                - button "Copy link to clipboard" [ref=e1078] [cursor=pointer]:
                  - img [ref=e1080]
                - generic [ref=e1082]: State management best practices
            - list [ref=e1083]:
              - listitem [ref=e1084]:
                - text: •
                - strong [ref=e1085]: Use structured formats for state data
                - text: ": When tracking structured information (like test results or task status), use JSON or other structured formats to help Claude understand schema requirements"
              - listitem [ref=e1086]:
                - text: •
                - strong [ref=e1087]: Use unstructured text for progress notes
                - text: ": Freeform progress notes work well for tracking general progress and context"
              - listitem [ref=e1088]:
                - text: •
                - strong [ref=e1089]: Use git for state tracking
                - text: ": Git provides a log of what's been done and checkpoints that can be restored. Claude's latest models perform especially well in using git to track state across multiple sessions."
              - listitem [ref=e1090]:
                - text: •
                - strong [ref=e1091]: Emphasize incremental progress
                - text: ": Explicitly ask Claude to keep track of its progress and focus on incremental work"
            - 'heading "Example: State tracking" [level=3] [ref=e1094]':
              - 'button "Example: State tracking" [ref=e1095] [cursor=pointer]':
                - img [ref=e1096]
                - generic [ref=e1098]: "Example: State tracking"
            - heading "Copy link to clipboard Balancing autonomy and safety" [level=3] [ref=e1099]:
              - generic [ref=e1100]:
                - button "Copy link to clipboard" [ref=e1102] [cursor=pointer]:
                  - img [ref=e1104]
                - generic [ref=e1106]: Balancing autonomy and safety
            - paragraph [ref=e1107]: "Without guidance, Claude Opus 4.6 may take actions that are difficult to reverse or affect shared systems, such as deleting files, force-pushing, or posting to external services. If you want Claude Opus 4.6 to confirm before taking potentially risky actions, add guidance to your prompt:"
            - generic [ref=e1108]:
              - generic [ref=e1109]:
                - generic [ref=e1110]: Sample prompt
                - button "Copy code" [ref=e1112] [cursor=pointer]:
                  - generic [ref=e1113]:
                    - img [ref=e1115]
                    - img [ref=e1118]
              - code [ref=e1122]: "Consider the reversibility and potential impact of your actions. You are encouraged to take local, reversible actions like editing files or running tests, but for actions that are hard to reverse, affect shared systems, or could be destructive, ask the user before proceeding. Examples of actions that warrant confirmation: - Destructive operations: deleting files or branches, dropping database tables, rm -rf - Hard to reverse operations: git push --force, git reset --hard, amending published commits - Operations visible to others: pushing code, commenting on PRs/issues, sending messages, modifying shared infrastructure When encountering obstacles, do not use destructive actions as a shortcut. For example, don't bypass safety checks (e.g. --no-verify) or discard unfamiliar files that may be in-progress work."
            - heading "Copy link to clipboard Research and information gathering" [level=3] [ref=e1123]:
              - generic [ref=e1124]:
                - button "Copy link to clipboard" [ref=e1126] [cursor=pointer]:
                  - img [ref=e1128]
                - generic [ref=e1130]: Research and information gathering
            - paragraph [ref=e1131]: "Claude's latest models demonstrate exceptional agentic search capabilities and can find and synthesize information from multiple sources effectively. For optimal research results:"
            - list [ref=e1132]:
              - listitem [ref=e1133]:
                - paragraph [ref=e1134]:
                  - strong [ref=e1135]: Provide clear success criteria
                  - text: ": Define what constitutes a successful answer to your research question"
              - listitem [ref=e1136]:
                - paragraph [ref=e1137]:
                  - strong [ref=e1138]: Encourage source verification
                  - text: ": Ask Claude to verify information across multiple sources"
              - listitem [ref=e1139]:
                - paragraph [ref=e1140]:
                  - strong [ref=e1141]: For complex research tasks, use a structured approach
                  - text: ":"
            - generic [ref=e1142]:
              - generic [ref=e1143]:
                - generic [ref=e1144]: Sample prompt for complex research
                - button "Copy code" [ref=e1146] [cursor=pointer]:
                  - generic [ref=e1147]:
                    - img [ref=e1149]
                    - img [ref=e1152]
              - code [ref=e1156]: Search for this information in a structured way. As you gather data, develop several competing hypotheses. Track your confidence levels in your progress notes to improve calibration. Regularly self-critique your approach and plan. Update a hypothesis tree or research notes file to persist information and provide transparency. Break down this complex research task systematically.
            - paragraph [ref=e1157]: This structured approach allows Claude to find and synthesize virtually any piece of information and iteratively critique its findings, no matter the size of the corpus.
            - heading "Copy link to clipboard Subagent orchestration" [level=3] [ref=e1158]:
              - generic [ref=e1159]:
                - button "Copy link to clipboard" [ref=e1161] [cursor=pointer]:
                  - img [ref=e1163]
                - generic [ref=e1165]: Subagent orchestration
            - paragraph [ref=e1166]: Claude's latest models demonstrate significantly improved native subagent orchestration capabilities. These models can recognize when tasks would benefit from delegating work to specialized subagents and do so proactively without requiring explicit instruction.
            - paragraph [ref=e1167]: "To take advantage of this behavior:"
            - list [ref=e1168]:
              - listitem [ref=e1169]:
                - strong [ref=e1170]: Ensure well-defined subagent tools
                - text: ": Have subagent tools available and described in tool definitions"
              - listitem [ref=e1171]:
                - strong [ref=e1172]: Let Claude orchestrate naturally
                - text: ": Claude will delegate appropriately without explicit instruction"
              - listitem [ref=e1173]:
                - strong [ref=e1174]: Watch for overuse
                - text: ": Claude Opus 4.6 has a strong predilection for subagents and may spawn them in situations where a simpler, direct approach would suffice. For example, the model may spawn subagents for code exploration when a direct grep call is faster and sufficient."
            - paragraph [ref=e1175]: "If you're seeing excessive subagent use, add explicit guidance about when subagents are and aren't warranted:"
            - generic [ref=e1176]:
              - generic [ref=e1177]:
                - generic [ref=e1178]: Sample prompt for subagent usage
                - button "Copy code" [ref=e1180] [cursor=pointer]:
                  - generic [ref=e1181]:
                    - img [ref=e1183]
                    - img [ref=e1186]
              - code [ref=e1190]: Use subagents when tasks can run in parallel, require isolated context, or involve independent workstreams that don't need to share state. For simple tasks, sequential operations, single-file edits, or tasks where you need to maintain context across steps, work directly rather than delegating.
            - heading "Copy link to clipboard Chain complex prompts" [level=3] [ref=e1191]:
              - generic [ref=e1192]:
                - button "Copy link to clipboard" [ref=e1194] [cursor=pointer]:
                  - img [ref=e1196]
                - generic [ref=e1198]: Chain complex prompts
            - paragraph [ref=e1199]: With adaptive thinking and subagent orchestration, Claude handles most multi-step reasoning internally. Explicit prompt chaining (breaking a task into sequential API calls) is still useful when you need to inspect intermediate outputs or enforce a specific pipeline structure.
            - paragraph [ref=e1200]:
              - text: The most common chaining pattern is
              - strong [ref=e1201]: self-correction
              - text: ": generate a draft → have Claude review it against criteria → have Claude refine based on the review. Each step is a separate API call so you can log, evaluate, or branch at any point."
            - heading "Copy link to clipboard Reduce file creation in agentic coding" [level=3] [ref=e1202]:
              - generic [ref=e1203]:
                - button "Copy link to clipboard" [ref=e1205] [cursor=pointer]:
                  - img [ref=e1207]
                - generic [ref=e1209]: Reduce file creation in agentic coding
            - paragraph [ref=e1210]: Claude's latest models may sometimes create new files for testing and iteration purposes, particularly when working with code. This approach allows Claude to use files, especially python scripts, as a 'temporary scratchpad' before saving its final output. Using temporary files can improve outcomes particularly for agentic coding use cases.
            - paragraph [ref=e1211]: "If you'd prefer to minimize net new file creation, you can instruct Claude to clean up after itself:"
            - generic [ref=e1212]:
              - generic [ref=e1213]:
                - generic [ref=e1214]: Sample prompt
                - button "Copy code" [ref=e1216] [cursor=pointer]:
                  - generic [ref=e1217]:
                    - img [ref=e1219]
                    - img [ref=e1222]
              - code [ref=e1226]: If you create any temporary new files, scripts, or helper files for iteration, clean up these files by removing them at the end of the task.
            - heading "Copy link to clipboard Overeagerness" [level=3] [ref=e1227]:
              - generic [ref=e1228]:
                - button "Copy link to clipboard" [ref=e1230] [cursor=pointer]:
                  - img [ref=e1232]
                - generic [ref=e1234]: Overeagerness
            - paragraph [ref=e1235]: Claude Opus 4.5 and Claude Opus 4.6 have a tendency to overengineer by creating extra files, adding unnecessary abstractions, or building in flexibility that wasn't requested. If you're seeing this undesired behavior, add specific guidance to keep solutions minimal.
            - paragraph [ref=e1236]: "For example:"
            - generic [ref=e1237]:
              - generic [ref=e1238]:
                - generic [ref=e1239]: Sample prompt to minimize overengineering
                - button "Copy code" [ref=e1241] [cursor=pointer]:
                  - generic [ref=e1242]:
                    - img [ref=e1244]
                    - img [ref=e1247]
              - code [ref=e1251]: "Avoid over-engineering. Only make changes that are directly requested or clearly necessary. Keep solutions simple and focused: - Scope: Don't add features, refactor code, or make \"improvements\" beyond what was asked. A bug fix doesn't need surrounding code cleaned up. A simple feature doesn't need extra configurability. - Documentation: Don't add docstrings, comments, or type annotations to code you didn't change. Only add comments where the logic isn't self-evident. - Defensive coding: Don't add error handling, fallbacks, or validation for scenarios that can't happen. Trust internal code and framework guarantees. Only validate at system boundaries (user input, external APIs). - Abstractions: Don't create helpers, utilities, or abstractions for one-time operations. Don't design for hypothetical future requirements. The right amount of complexity is the minimum needed for the current task."
            - heading "Copy link to clipboard Avoid focusing on passing tests and hard-coding" [level=3] [ref=e1252]:
              - generic [ref=e1253]:
                - button "Copy link to clipboard" [ref=e1255] [cursor=pointer]:
                  - img [ref=e1257]
                - generic [ref=e1259]: Avoid focusing on passing tests and hard-coding
            - paragraph [ref=e1260]: "Claude can sometimes focus too heavily on making tests pass at the expense of more general solutions, or may use workarounds like helper scripts for complex refactoring instead of using standard tools directly. To prevent this behavior and ensure robust, generalizable solutions:"
            - generic [ref=e1261]:
              - generic [ref=e1262]:
                - generic [ref=e1263]: Sample prompt
                - button "Copy code" [ref=e1265] [cursor=pointer]:
                  - generic [ref=e1266]:
                    - img [ref=e1268]
                    - img [ref=e1271]
              - code [ref=e1275]: Please write a high-quality, general-purpose solution using the standard tools available. Do not create helper scripts or workarounds to accomplish the task more efficiently. Implement a solution that works correctly for all valid inputs, not just the test cases. Do not hard-code values or create solutions that only work for specific test inputs. Instead, implement the actual logic that solves the problem generally. Focus on understanding the problem requirements and implementing the correct algorithm. Tests are there to verify correctness, not to define the solution. Provide a principled implementation that follows best practices and software design principles. If the task is unreasonable or infeasible, or if any of the tests are incorrect, please inform me rather than working around them. The solution should be robust, maintainable, and extendable.
            - heading "Copy link to clipboard Minimizing hallucinations in agentic coding" [level=3] [ref=e1276]:
              - generic [ref=e1277]:
                - button "Copy link to clipboard" [ref=e1279] [cursor=pointer]:
                  - img [ref=e1281]
                - generic [ref=e1283]: Minimizing hallucinations in agentic coding
            - paragraph [ref=e1284]: "Claude's latest models are less prone to hallucinations and give more accurate, grounded, intelligent answers based on the code. To encourage this behavior even more and minimize hallucinations:"
            - generic [ref=e1285]:
              - generic [ref=e1286]:
                - generic [ref=e1287]: Sample prompt
                - button "Copy code" [ref=e1289] [cursor=pointer]:
                  - generic [ref=e1290]:
                    - img [ref=e1292]
                    - img [ref=e1295]
              - code [ref=e1299]: <investigate_before_answering> Never speculate about code you have not opened. If the user references a specific file, you MUST read the file before answering. Make sure to investigate and read relevant files BEFORE answering questions about the codebase. Never make any claims about code before investigating unless you are certain of the correct answer - give grounded and hallucination-free answers. </investigate_before_answering>
            - heading "Copy link to clipboard Capability-specific tips" [level=2] [ref=e1300]:
              - generic [ref=e1301]:
                - button "Copy link to clipboard" [ref=e1303] [cursor=pointer]:
                  - img [ref=e1305]
                - generic [ref=e1307]: Capability-specific tips
            - heading "Copy link to clipboard Improved vision capabilities" [level=3] [ref=e1308]:
              - generic [ref=e1309]:
                - button "Copy link to clipboard" [ref=e1311] [cursor=pointer]:
                  - img [ref=e1313]
                - generic [ref=e1315]: Improved vision capabilities
            - paragraph [ref=e1316]: Claude Opus 4.5 and Claude Opus 4.6 have improved vision capabilities compared to previous Claude models. They perform better on image processing and data extraction tasks, particularly when there are multiple images present in context. These improvements carry over to computer use, where the models can more reliably interpret screenshots and UI elements. You can also use these models to analyze videos by breaking them up into frames.
            - paragraph [ref=e1317]:
              - text: One technique that has proven effective to further boost performance is to give Claude a crop tool or
              - link "skill" [ref=e1318] [cursor=pointer]:
                - /url: /docs/en/agents-and-tools/agent-skills/overview
              - text: . Testing has shown consistent uplift on image evaluations when Claude is able to "zoom" in on relevant regions of an image. Anthropic has created a
              - link "cookbook for the crop tool" [ref=e1319] [cursor=pointer]:
                - /url: https://platform.claude.com/cookbook/multimodal-crop-tool
              - text: .
            - heading "Copy link to clipboard Frontend design" [level=3] [ref=e1320]:
              - generic [ref=e1321]:
                - button "Copy link to clipboard" [ref=e1323] [cursor=pointer]:
                  - img [ref=e1325]
                - generic [ref=e1327]: Frontend design
            - paragraph [ref=e1328]: "Claude Opus 4.5 and Claude Opus 4.6 excel at building complex, real-world web applications with strong frontend design. However, without guidance, models can default to generic patterns that create what users call the \"AI slop\" aesthetic. To create distinctive, creative frontends that surprise and delight:"
            - generic [ref=e1329]:
              - img [ref=e1332]
              - paragraph [ref=e1335]:
                - text: For a detailed guide on improving frontend design, see the blog post on
                - link "improving frontend design through skills" [ref=e1336] [cursor=pointer]:
                  - /url: https://www.claude.com/blog/improving-frontend-design-through-skills
                - text: .
            - paragraph [ref=e1337]: "Here's a system prompt snippet you can use to encourage better frontend design:"
            - generic [ref=e1338]:
              - generic [ref=e1339]:
                - generic [ref=e1340]: Sample prompt for frontend aesthetics
                - button "Copy code" [ref=e1342] [cursor=pointer]:
                  - generic [ref=e1343]:
                    - img [ref=e1345]
                    - img [ref=e1348]
              - code [ref=e1352]: "<frontend_aesthetics> You tend to converge toward generic, \"on distribution\" outputs. In frontend design, this creates what users call the \"AI slop\" aesthetic. Avoid this: make creative, distinctive frontends that surprise and delight. Focus on: - Typography: Choose fonts that are beautiful, unique, and interesting. Avoid generic fonts like Arial and Inter; opt instead for distinctive choices that elevate the frontend's aesthetics. - Color & Theme: Commit to a cohesive aesthetic. Use CSS variables for consistency. Dominant colors with sharp accents outperform timid, evenly-distributed palettes. Draw from IDE themes and cultural aesthetics for inspiration. - Motion: Use animations for effects and micro-interactions. Prioritize CSS-only solutions for HTML. Use Motion library for React when available. Focus on high-impact moments: one well-orchestrated page load with staggered reveals (animation-delay) creates more delight than scattered micro-interactions. - Backgrounds: Create atmosphere and depth rather than defaulting to solid colors. Layer CSS gradients, use geometric patterns, or add contextual effects that match the overall aesthetic. Avoid generic AI-generated aesthetics: - Overused font families (Inter, Roboto, Arial, system fonts) - Clichéd color schemes (particularly purple gradients on white backgrounds) - Predictable layouts and component patterns - Cookie-cutter design that lacks context-specific character Interpret creatively and make unexpected choices that feel genuinely designed for the context. Vary between light and dark themes, different fonts, different aesthetics. You still tend to converge on common choices (Space Grotesk, for example) across generations. Avoid this: it is critical that you think outside the box! </frontend_aesthetics>"
            - paragraph [ref=e1353]:
              - text: You can also refer to the
              - link "full skill definition" [ref=e1354] [cursor=pointer]:
                - /url: https://github.com/anthropics/claude-code/blob/main/plugins/frontend-design/skills/frontend-design/SKILL.md
              - text: .
            - heading "Copy link to clipboard Migration considerations" [level=2] [ref=e1355]:
              - generic [ref=e1356]:
                - button "Copy link to clipboard" [ref=e1358] [cursor=pointer]:
                  - img [ref=e1360]
                - generic [ref=e1362]: Migration considerations
            - paragraph [ref=e1363]: "When migrating to Claude 4.6 models from earlier generations:"
            - list [ref=e1364]:
              - listitem [ref=e1365]:
                - paragraph [ref=e1366]:
                  - strong [ref=e1367]: Be specific about desired behavior
                  - text: ": Consider describing exactly what you'd like to see in the output."
              - listitem [ref=e1368]:
                - paragraph [ref=e1369]:
                  - strong [ref=e1370]: Frame your instructions with modifiers
                  - text: ": Adding modifiers that encourage Claude to increase the quality and detail of its output can help better shape Claude's performance. For example, instead of \"Create an analytics dashboard\", use \"Create an analytics dashboard. Include as many relevant features and interactions as possible. Go beyond the basics to create a fully-featured implementation.\""
              - listitem [ref=e1371]:
                - paragraph [ref=e1372]:
                  - strong [ref=e1373]: Request specific features explicitly
                  - text: ": Animations and interactive elements should be requested explicitly when desired."
              - listitem [ref=e1374]:
                - paragraph [ref=e1375]:
                  - strong [ref=e1376]: Update thinking configuration
                  - text: ": Claude 4.6 models use"
                  - link "adaptive thinking" [ref=e1377] [cursor=pointer]:
                    - /url: /docs/en/build-with-claude/adaptive-thinking
                  - text: (
                  - code [ref=e1378]: "thinking: {type: \"adaptive\"}"
                  - text: ) instead of manual thinking with
                  - code [ref=e1379]: budget_tokens
                  - text: . Use the
                  - link "effort parameter" [ref=e1380] [cursor=pointer]:
                    - /url: /docs/en/build-with-claude/effort
                  - text: to control thinking depth.
              - listitem [ref=e1381]:
                - paragraph [ref=e1382]:
                  - strong [ref=e1383]: Migrate away from prefilled responses
                  - text: ": Prefilled responses on the last assistant turn are deprecated starting with Claude 4.6 models. See"
                  - link "Migrating away from prefilled responses" [ref=e1384] [cursor=pointer]:
                    - /url: "#migrating-away-from-prefilled-responses"
                  - text: for detailed guidance on alternatives.
              - listitem [ref=e1385]:
                - paragraph [ref=e1386]:
                  - strong [ref=e1387]: Tune anti-laziness prompting
                  - text: ": If your prompts previously encouraged the model to be more thorough or use tools more aggressively, dial back that guidance. Claude 4.6 models are significantly more proactive and may overtrigger on instructions that were needed for previous models."
            - paragraph [ref=e1388]:
              - text: For detailed migration steps, see the
              - link "Migration guide" [ref=e1389] [cursor=pointer]:
                - /url: /docs/en/about-claude/models/migration-guide
              - text: .
            - heading "Copy link to clipboard Migrating from Claude Sonnet 4.5 to Claude Sonnet 4.6" [level=3] [ref=e1390]:
              - generic [ref=e1391]:
                - button "Copy link to clipboard" [ref=e1393] [cursor=pointer]:
                  - img [ref=e1395]
                - generic [ref=e1397]: Migrating from Claude Sonnet 4.5 to Claude Sonnet 4.6
            - paragraph [ref=e1398]:
              - text: Claude Sonnet 4.6 defaults to an effort level of
              - code [ref=e1399]: high
              - text: ", in contrast to Claude Sonnet 4.5 which had no effort parameter. Consider adjusting the effort parameter as you migrate from Claude Sonnet 4.5 to Claude Sonnet 4.6. If not explicitly set, you may experience higher latency with the default effort level."
            - paragraph [ref=e1400]:
              - strong [ref=e1401]: "Recommended effort settings:"
            - list [ref=e1402]:
              - listitem [ref=e1403]:
                - text: •
                - strong [ref=e1404]: Medium
                - text: for most applications
              - listitem [ref=e1405]:
                - text: •
                - strong [ref=e1406]: Low
                - text: for high-volume or latency-sensitive workloads
              - listitem [ref=e1407]: • Set a large max output token budget (64k tokens recommended) at medium or high effort to give the model room to think and act
            - paragraph [ref=e1408]:
              - strong [ref=e1409]: "When to use Opus 4.6 instead:"
              - text: For the hardest, longest-horizon problems (large-scale code migrations, deep research, extended autonomous work), Opus 4.6 remains the right choice. Sonnet 4.6 is optimized for workloads where fast turnaround and cost efficiency matter most.
            - heading "Copy link to clipboard If you're not using extended thinking" [level=4] [ref=e1410]:
              - generic [ref=e1411]:
                - button "Copy link to clipboard" [ref=e1413] [cursor=pointer]:
                  - img [ref=e1415]
                - generic [ref=e1417]: If you're not using extended thinking
            - paragraph [ref=e1418]:
              - text: If you're not using extended thinking on Claude Sonnet 4.5, you can continue without it on Claude Sonnet 4.6. You should explicitly set effort to the level appropriate for your use case. At
              - code [ref=e1419]: low
              - text: effort with thinking disabled, you can expect similar or better performance relative to Claude Sonnet 4.5 with no extended thinking.
            - generic [ref=e1420]:
              - generic [ref=e1421]:
                - generic [ref=e1422]: Python
                - button "Copy code" [ref=e1424] [cursor=pointer]:
                  - generic [ref=e1425]:
                    - img [ref=e1427]
                    - img [ref=e1430]
              - code [ref=e1435]:
                - generic [ref=e1436]: client.messages.create(
                - generic [ref=e1437]: model="claude-sonnet-4-6",
                - generic [ref=e1438]: max_tokens=8192,
