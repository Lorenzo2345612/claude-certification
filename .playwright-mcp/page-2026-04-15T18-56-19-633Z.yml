            - paragraph [ref=e818]:
              - text: Claude Opus 4.6 does significantly more upfront exploration than previous models, especially at higher
              - code [ref=e819]: effort
              - text: "settings. This initial work often helps to optimize the final results, but the model may gather extensive context or pursue multiple threads of research without being prompted. If your prompts previously encouraged the model to be more thorough, you should tune that guidance for Claude Opus 4.6:"
            - list [ref=e820]:
              - listitem [ref=e821]:
                - text: •
                - strong [ref=e822]: Replace blanket defaults with more targeted instructions.
                - text: Instead of "Default to using [tool]," add guidance like "Use [tool] when it would enhance your understanding of the problem."
              - listitem [ref=e823]:
                - text: •
                - strong [ref=e824]: Remove over-prompting.
                - text: Tools that undertriggered in previous models are likely to trigger appropriately now. Instructions like "If in doubt, use [tool]" will cause overtriggering.
              - listitem [ref=e825]:
