            - list [ref=e767]:
              - listitem [ref=e768]: • Run multiple speculative searches during research
              - listitem [ref=e769]: • Read several files at once to build context faster
              - listitem [ref=e770]: • Execute bash commands in parallel (which can even bottleneck system performance)
            - paragraph [ref=e771]: "This behavior is easily steerable. While the model has a high success rate in parallel tool calling without prompting, you can boost this to ~100% or adjust the aggression level:"
            - generic [ref=e772]:
