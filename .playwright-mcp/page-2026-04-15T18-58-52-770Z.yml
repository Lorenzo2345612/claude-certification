            - generic [ref=e223] [cursor=pointer]: Tools
          - generic [ref=e224]: Tools enable AI models to perform actions. Each tool defines a specific operation with typed inputs and outputs. The model requests tool execution based on context.
          - heading "Navigate to header How Tools Work" [level=4] [ref=e225]:
            - link "Navigate to header" [ref=e226] [cursor=pointer]:
              - /url: "#how-tools-work"
              - img [ref=e228]
            - generic [ref=e230] [cursor=pointer]: How Tools Work
          - generic [ref=e231]: Tools are schema-defined interfaces that LLMs can invoke. MCP uses JSON Schema for validation. Each tool performs a single operation with clearly defined inputs and outputs. Tools may require user consent prior to execution, helping to ensure users maintain control over actions taken by a model.
          - strong [ref=e233]: "Protocol operations:"
          - table [ref=e236]:
            - rowgroup [ref=e237]:
              - row "Method Purpose Returns" [ref=e238]:
                - columnheader "Method" [ref=e239]
