            - code [ref=e533]:
              - generic [ref=e534]: "{"
              - generic [ref=e535]: "\"name\": \"plan-vacation\","
              - generic [ref=e536]: "\"title\": \"Plan a vacation\","
              - generic [ref=e537]: "\"description\": \"Guide through vacation planning process\","
              - generic [ref=e538]: "\"arguments\": ["
