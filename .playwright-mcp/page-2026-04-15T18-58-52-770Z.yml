          - 'heading "Navigate to header Example: Travel Booking" [level=4] [ref=e279]':
            - link "Navigate to header" [ref=e280] [cursor=pointer]:
              - /url: "#example-travel-booking"
              - img [ref=e282]
            - generic [ref=e284] [cursor=pointer]: "Example: Travel Booking"
          - generic [ref=e285]: "Tools enable AI applications to perform actions on behalf of users. In a travel planning scenario, the AI application might use several tools to help book a vacation:"
          - strong [ref=e287]: Flight Search
          - generic [ref=e288]:
            - button "Copy the contents from the code block" [ref=e291] [cursor=pointer]:
              - img [ref=e292]
            - code [ref=e298]:
              - generic [ref=e299]: "searchFlights(origin: \"NYC\", destination: \"Barcelona\", date: \"2024-06-15\")"
          - generic [ref=e300]: Queries multiple airlines and returns structured flight options.
          - strong [ref=e302]: Calendar Blocking
          - generic [ref=e303]:
            - button "Copy the contents from the code block" [ref=e306] [cursor=pointer]:
              - img [ref=e307]
            - code [ref=e313]:
              - generic [ref=e314]: "createCalendarEvent(title: \"Barcelona Trip\", startDate: \"2024-06-15\", endDate: \"2024-06-22\")"
          - generic [ref=e315]: Marks the travel dates in the user’s calendar.
          - strong [ref=e317]: Email notification
          - generic [ref=e318]:
            - button "Copy the contents from the code block" [ref=e321] [cursor=pointer]:
              - img [ref=e322]
            - code [ref=e328]:
              - generic [ref=e329]: "sendEmail(to: \"team@work.com\", subject: \"Out of Office\", body: \"...\")"
          - generic [ref=e330]: Sends an automated out-of-office message to colleagues.
          - heading "Navigate to header User Interaction Model" [level=4] [ref=e331]:
            - link "Navigate to header" [ref=e332] [cursor=pointer]:
              - /url: "#user-interaction-model"
              - img [ref=e334]
            - generic [ref=e336] [cursor=pointer]: User Interaction Model
          - generic [ref=e337]: Tools are model-controlled, meaning AI models can discover and invoke them automatically. However, MCP emphasizes human oversight through several mechanisms.
          - generic [ref=e338]: "For trust and safety, applications can implement user control through various mechanisms, such as:"
          - list [ref=e339]:
            - listitem [ref=e340]: Displaying available tools in the UI, enabling users to define whether a tool should be made available in specific interactions
            - listitem [ref=e341]: Approval dialogs for individual tool executions
            - listitem [ref=e342]: Permission settings for pre-approving certain safe operations
            - listitem [ref=e343]: Activity logs that show all tool executions with their results
          - heading "Navigate to header Resources" [level=3] [ref=e344]:
            - link "Navigate to header" [ref=e345] [cursor=pointer]:
              - /url: "#resources"
              - img [ref=e347]
            - generic [ref=e349] [cursor=pointer]: Resources
          - generic [ref=e350]: Resources provide structured access to information that the AI application can retrieve and provide to models as context.
          - heading "Navigate to header How Resources Work" [level=4] [ref=e351]:
            - link "Navigate to header" [ref=e352] [cursor=pointer]:
              - /url: "#how-resources-work"
              - img [ref=e354]
            - generic [ref=e356] [cursor=pointer]: How Resources Work
          - generic [ref=e357]: Resources expose data from files, APIs, databases, or any other source that an AI needs to understand context. Applications can access this information directly and decide how to use it - whether that’s selecting relevant portions, searching with embeddings, or passing it all to the model.
          - generic [ref=e358]:
            - text: Each resource has a unique URI (e.g.,
            - code [ref=e359]: file:///path/to/document.md
            - text: ) and declares its MIME type for appropriate content handling.
          - generic [ref=e360]: "Resources support two discovery patterns:"
          - list [ref=e361]:
            - listitem [ref=e362]:
              - strong [ref=e363]: Direct Resources
              - text: "- fixed URIs that point to specific data. Example:"
              - code [ref=e364]: calendar://events/2024
              - text: "- returns calendar availability for 2024"
            - listitem [ref=e365]:
              - strong [ref=e366]: Resource Templates
              - text: "- dynamic URIs with parameters for flexible queries. Example:"
              - list [ref=e367]:
                - listitem [ref=e368]:
                  - code [ref=e369]: "travel://activities/{city}/{category}"
                  - text: "- returns activities by city and category"
                - listitem [ref=e370]:
                  - code [ref=e371]: travel://activities/barcelona/museums
                  - text: "- returns all museums in Barcelona"
          - generic [ref=e372]: Resource Templates include metadata such as title, description, and expected MIME type, making them discoverable and self-documenting.
          - strong [ref=e374]: "Protocol operations:"
          - table [ref=e377]:
            - rowgroup [ref=e378]:
              - row "Method Purpose Returns" [ref=e379]:
                - columnheader "Method" [ref=e380]
                - columnheader "Purpose" [ref=e381]
                - columnheader "Returns" [ref=e382]
            - rowgroup [ref=e383]:
              - row "resources/list List available direct resources Array of resource descriptors" [ref=e384]:
                - cell "resources/list" [ref=e385]:
                  - code [ref=e386]: resources/list
                - cell "List available direct resources" [ref=e387]
                - cell "Array of resource descriptors" [ref=e388]
              - row "resources/templates/list Discover resource templates Array of resource template definitions" [ref=e389]:
                - cell "resources/templates/list" [ref=e390]:
                  - code [ref=e391]: resources/templates/list
                - cell "Discover resource templates" [ref=e392]
                - cell "Array of resource template definitions" [ref=e393]
              - row "resources/read Retrieve resource contents Resource data with metadata" [ref=e394]:
                - cell "resources/read" [ref=e395]:
                  - code [ref=e396]: resources/read
                - cell "Retrieve resource contents" [ref=e397]
                - cell "Resource data with metadata" [ref=e398]
              - row "resources/subscribe Monitor resource changes Subscription confirmation" [ref=e399]:
                - cell "resources/subscribe" [ref=e400]:
                  - code [ref=e401]: resources/subscribe
                - cell "Monitor resource changes" [ref=e402]
                - cell "Subscription confirmation" [ref=e403]
          - 'heading "Navigate to header Example: Getting Travel Planning Context" [level=4] [ref=e404]':
            - link "Navigate to header" [ref=e405] [cursor=pointer]:
              - /url: "#example-getting-travel-planning-context"
              - img [ref=e407]
            - generic [ref=e409] [cursor=pointer]: "Example: Getting Travel Planning Context"
          - generic [ref=e410]: "Continuing with the travel planning example, resources provide the AI application with access to relevant information:"
          - list [ref=e411]:
            - listitem [ref=e412]:
              - strong [ref=e413]: Calendar data
              - text: (
              - code [ref=e414]: calendar://events/2024
              - text: ) - Checks user availability
            - listitem [ref=e415]:
              - strong [ref=e416]: Travel documents
              - text: (
              - code [ref=e417]: file:///Documents/Travel/passport.pdf
              - text: ) - Accesses important documents
            - listitem [ref=e418]:
              - strong [ref=e419]: Previous itineraries
              - text: (
              - code [ref=e420]: trips://history/barcelona-2023
              - text: ) - References past trips and preferences
          - generic [ref=e421]: The AI application retrieves these resources and decides how to process them, whether selecting a subset of data using embeddings or keyword search, or passing raw data directly to the model.
          - generic [ref=e422]: In this case, it provides calendar data, weather information, and travel preferences to the model, enabling it to check availability, look up weather patterns, and reference past travel preferences.
          - strong [ref=e424]: "Resource Template Examples:"
          - generic [ref=e425]:
            - button "Copy the contents from the code block" [ref=e428] [cursor=pointer]:
              - img [ref=e429]
            - code [ref=e435]:
              - generic [ref=e436]: "{"
              - generic [ref=e437]: "\"uriTemplate\": \"weather://forecast/{city}/{date}\","
              - generic [ref=e438]: "\"name\": \"weather-forecast\","
              - generic [ref=e439]: "\"title\": \"Weather Forecast\","
              - generic [ref=e440]: "\"description\": \"Get weather forecast for any city and date\","
              - generic [ref=e441]: "\"mimeType\": \"application/json\""
              - generic [ref=e442]: "}"
              - generic [ref=e443]: "{"
              - generic [ref=e444]: "\"uriTemplate\": \"travel://flights/{origin}/{destination}\","
              - generic [ref=e445]: "\"name\": \"flight-search\","
              - generic [ref=e446]: "\"title\": \"Flight Search\","
              - generic [ref=e447]: "\"description\": \"Search available flights between cities\","
              - generic [ref=e448]: "\"mimeType\": \"application/json\""
              - generic [ref=e449]: "}"
          - generic [ref=e450]:
            - text: These templates enable flexible queries. For weather data, users can access forecasts for any city/date combination. For flights, they can search routes between any two airports. When a user has input “NYC” as the
            - code [ref=e451]: origin
            - text: airport and begins to input “Bar” as the
            - code [ref=e452]: destination
            - text: airport, the system can suggest “Barcelona (BCN)” or “Barbados (BGI)”.
          - heading "Navigate to header Parameter Completion" [level=4] [ref=e453]:
            - link "Navigate to header" [ref=e454] [cursor=pointer]:
              - /url: "#parameter-completion"
              - img [ref=e456]
            - generic [ref=e458] [cursor=pointer]: Parameter Completion
          - generic [ref=e459]: "Dynamic resources support parameter completion. For example:"
          - list [ref=e460]:
            - listitem [ref=e461]:
              - text: Typing “Par” as input for
              - code [ref=e462]: "weather://forecast/{city}"
              - text: might suggest “Paris” or “Park City”
            - listitem [ref=e463]:
              - text: Typing “JFK” for
              - code [ref=e464]: "flights://search/{airport}"
              - text: might suggest “JFK - John F. Kennedy International”
          - generic [ref=e465]: The system helps discover valid values without requiring exact format knowledge.
          - heading "Navigate to header User Interaction Model" [level=4] [ref=e466]:
            - link "Navigate to header" [ref=e467] [cursor=pointer]:
              - /url: "#user-interaction-model-2"
              - img [ref=e469]
            - generic [ref=e471] [cursor=pointer]: User Interaction Model
          - generic [ref=e472]: "Resources are application-driven, giving them flexibility in how they retrieve, process, and present available context. Common interaction patterns include:"
          - list [ref=e473]:
            - listitem [ref=e474]: Tree or list views for browsing resources in familiar folder-like structures
            - listitem [ref=e475]: Search and filter interfaces for finding specific resources
            - listitem [ref=e476]: Automatic context inclusion or smart suggestions based on heuristics or AI selection
            - listitem [ref=e477]: Manual or bulk selection interfaces for including single or multiple resources
          - generic [ref=e478]: Applications are free to implement resource discovery through any interface pattern that suits their needs. The protocol doesn’t mandate specific UI patterns, allowing for resource pickers with preview capabilities, smart suggestions based on current conversation context, bulk selection for including multiple resources, or integration with existing file browsers and data explorers.
          - heading "Navigate to header Prompts" [level=3] [ref=e479]:
            - link "Navigate to header" [ref=e480] [cursor=pointer]:
              - /url: "#prompts"
              - img [ref=e482]
            - generic [ref=e484] [cursor=pointer]: Prompts
          - generic [ref=e485]: Prompts provide reusable templates. They allow MCP server authors to provide parameterized prompts for a domain, or showcase how to best use the MCP server.
          - heading "Navigate to header How Prompts Work" [level=4] [ref=e486]:
            - link "Navigate to header" [ref=e487] [cursor=pointer]:
              - /url: "#how-prompts-work"
              - img [ref=e489]
            - generic [ref=e491] [cursor=pointer]: How Prompts Work
          - generic [ref=e492]: Prompts are structured templates that define expected inputs and interaction patterns. They are user-controlled, requiring explicit invocation rather than automatic triggering. Prompts can be context-aware, referencing available resources and tools to create comprehensive workflows. Similar to resources, prompts support parameter completion to help users discover valid argument values.
          - strong [ref=e494]: "Protocol operations:"
          - table [ref=e497]:
            - rowgroup [ref=e498]:
              - row "Method Purpose Returns" [ref=e499]:
                - columnheader "Method" [ref=e500]
                - columnheader "Purpose" [ref=e501]
                - columnheader "Returns" [ref=e502]
            - rowgroup [ref=e503]:
              - row "prompts/list Discover available prompts Array of prompt descriptors" [ref=e504]:
                - cell "prompts/list" [ref=e505]:
                  - code [ref=e506]: prompts/list
                - cell "Discover available prompts" [ref=e507]
                - cell "Array of prompt descriptors" [ref=e508]
              - row "prompts/get Retrieve prompt details Full prompt definition with arguments" [ref=e509]:
                - cell "prompts/get" [ref=e510]:
                  - code [ref=e511]: prompts/get
                - cell "Retrieve prompt details" [ref=e512]
                - cell "Full prompt definition with arguments" [ref=e513]
          - 'heading "Navigate to header Example: Streamlined Workflows" [level=4] [ref=e514]':
            - link "Navigate to header" [ref=e515] [cursor=pointer]:
              - /url: "#example-streamlined-workflows"
              - img [ref=e517]
            - generic [ref=e519] [cursor=pointer]: "Example: Streamlined Workflows"
          - generic [ref=e520]: "Prompts provide structured templates for common tasks. In the travel planning context:"
