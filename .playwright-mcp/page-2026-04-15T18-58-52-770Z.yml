                - columnheader "Returns" [ref=e241]
            - rowgroup [ref=e242]:
              - row "tools/list Discover available tools Array of tool definitions with schemas" [ref=e243]:
                - cell "tools/list" [ref=e244]:
                  - code [ref=e245]: tools/list
