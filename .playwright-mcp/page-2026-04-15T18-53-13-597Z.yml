                - 'img "Diagram showing the four tool_choice options: auto, any, tool, and none" [ref=e595]'
            - paragraph [ref=e596]:
              - text: Note that when you have
              - code [ref=e597]: tool_choice
              - text: as
              - code [ref=e598]: any
              - text: or
              - code [ref=e599]: tool
