                - text: ", changes to the"
                - code [ref=e589]: tool_choice
                - text: parameter will invalidate cached message blocks. Tool definitions and system prompts remain cached, but message content must be reprocessed.
            - paragraph [ref=e590]: "This diagram illustrates how each option works:"
