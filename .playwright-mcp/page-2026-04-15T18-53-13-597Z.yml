            - paragraph [ref=e554]:
              - text: In some cases, you may want Claude to use a specific tool to answer the user's question, even if Claude would otherwise answer directly without calling a tool. You can do this by specifying the tool in the
              - code [ref=e555]: tool_choice
              - text: "field like so:"
            - generic [ref=e556]:
