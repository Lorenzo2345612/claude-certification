            - paragraph [ref=e377]:
              - text: When you call the Claude API with the
              - code [ref=e378]: tools
              - text: "parameter, the API constructs a special system prompt from the tool definitions, tool configuration, and any user-specified system prompt. The constructed prompt is designed to instruct the model to use the specified tool(s) and provide the necessary context for the tool to operate properly:"
            - generic [ref=e379]:
              - code [ref=e382]: "In this environment you have access to a set of tools you can use to answer the user's question. {{ FORMATTING INSTRUCTIONS }} String and scalar parameters should be specified as is, while lists and objects should use JSON format. Note that spaces for string values are not stripped. The output is not expected to be valid XML and is parsed with regular expressions. Here are the functions available in JSONSchema format: {{ TOOL DEFINITIONS IN JSON SCHEMA }} {{ USER SYSTEM PROMPT }} {{ TOOL CONFIGURATION }}"
              - button "Copy code" [ref=e384] [cursor=pointer]:
                - generic [ref=e385]:
                  - img [ref=e387]
                  - img [ref=e390]
            - heading "Copy link to clipboard Best practices for tool definitions" [level=3] [ref=e392]:
              - generic [ref=e393]:
                - button "Copy link to clipboard" [ref=e395] [cursor=pointer]:
                  - img [ref=e397]
                - generic [ref=e399]: Best practices for tool definitions
            - paragraph [ref=e400]: "To get the best performance out of Claude when using tools, follow these guidelines:"
            - list [ref=e401]:
              - listitem [ref=e402]:
                - text: •
                - strong [ref=e403]: Provide extremely detailed descriptions.
                - text: "This is by far the most important factor in tool performance. Your descriptions should explain every detail about the tool, including:"
                - list [ref=e404]:
                  - listitem [ref=e405]: • What the tool does
                  - listitem [ref=e406]: • When it should be used (and when it shouldn't)
                  - listitem [ref=e407]: • What each parameter means and how it affects the tool's behavior
                  - listitem [ref=e408]: • Any important caveats or limitations, such as what information the tool does not return if the tool name is unclear. The more context you can give Claude about your tools, the better it will be at deciding when and how to use them. Aim for at least 3-4 sentences per tool description, more if the tool is complex.
              - listitem [ref=e409]:
                - text: •
                - strong [ref=e410]:
                  - text: Prioritize descriptions, but consider using
                  - code [ref=e411]: input_examples
                  - text: for complex tools.
                - text: Clear descriptions are most important, but for tools with complex inputs, nested objects, or format-sensitive parameters, you can use the
                - code [ref=e412]: input_examples
                - text: field to provide schema-validated examples. See
                - link "Providing tool use examples" [ref=e413] [cursor=pointer]:
                  - /url: "#providing-tool-use-examples"
                - text: for details.
              - listitem [ref=e414]:
                - text: •
                - strong [ref=e415]: Consolidate related operations into fewer tools.
                - text: Rather than creating a separate tool for every action (
                - code [ref=e416]: create_pr
                - text: ","
                - code [ref=e417]: review_pr
                - text: ","
                - code [ref=e418]: merge_pr
                - text: ), group them into a single tool with an
                - code [ref=e419]: action
                - text: parameter. Fewer, more capable tools reduce selection ambiguity and make your tool surface easier for Claude to navigate.
              - listitem [ref=e420]:
                - text: •
                - strong [ref=e421]: Use meaningful namespacing in tool names.
                - text: When your tools span multiple services or resources, prefix names with the service (e.g.,
                - code [ref=e422]: github_list_prs
                - text: ","
                - code [ref=e423]: slack_send_message
                - text: ). This makes tool selection unambiguous as your library grows, and is especially important when using
                - link "tool search" [ref=e424] [cursor=pointer]:
                  - /url: /docs/en/agents-and-tools/tool-use/tool-search-tool
                - text: .
              - listitem [ref=e425]:
                - text: •
                - strong [ref=e426]: Design tool responses to return only high-signal information.
                - text: Return semantic, stable identifiers (e.g., slugs or UUIDs) rather than opaque internal references, and include only the fields Claude needs to reason about its next step. Bloated responses waste context and make it harder for Claude to extract what matters.
            - generic [ref=e427]:
              - heading "Example of a good tool description" [level=3] [ref=e429]:
