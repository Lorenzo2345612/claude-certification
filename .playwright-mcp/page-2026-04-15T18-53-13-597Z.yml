                  - img [ref=e567]
            - paragraph [ref=e569]: "When working with the tool_choice parameter, there are four possible options:"
            - list [ref=e570]:
              - listitem [ref=e571]:
                - text: •
                - code [ref=e572]: auto
                - text: allows Claude to decide whether to call any provided tools or not. This is the default value when
                - code [ref=e573]: tools
                - text: are provided.
              - listitem [ref=e574]:
                - text: •
                - code [ref=e575]: any
                - text: tells Claude that it must use one of the provided tools, but doesn't force a particular tool.
              - listitem [ref=e576]:
                - text: •
                - code [ref=e577]: tool
                - text: forces Claude to always use a particular tool.
              - listitem [ref=e578]:
                - text: •
                - code [ref=e579]: none
                - text: prevents Claude from using any tools. This is the default value when no
                - code [ref=e580]: tools
                - text: are provided.
            - generic [ref=e581]:
              - img [ref=e584]
              - paragraph [ref=e587]:
                - text: When using
                - link "prompt caching" [ref=e588] [cursor=pointer]:
