services:
  db:
    image: mysql:8.4
    container_name: quiz-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: quizdb
      MYSQL_USER: quizuser
      MYSQL_PASSWORD: quizpass
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend
    environment:
      DATABASE_URL: "mysql+pymysql://quizuser:quizpass@db:3306/quizdb"
      SECRET_KEY: "${SECRET_KEY:-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6}"
      CORS_ORIGINS: "http://localhost"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  quiz-app:
    build:
      context: ./quiz-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: quiz-app
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: quiz-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - quiz-app
    restart: unless-stopped

volumes:
  mysql_data:
